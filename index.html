<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>恐怖房間 - VR 優化版</title>
<style>
/* 保持原有樣式 */
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; overflow:hidden; font-family:'Courier New',monospace; }
canvas { display:block; }
#start-screen { position:fixed; inset:0; background:#000; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:100; }
#start-title { color:#8b0000; font-size:2.2rem; letter-spacing:14px; text-shadow:0 0 40px #ff0000; animation:flick 3s infinite; margin-bottom:8px; }
#start-sub { color:#252525; font-size:0.68rem; letter-spacing:6px; margin-bottom:50px; }
.btn { padding:12px 42px; background:transparent; border:1px solid #550000; color:#550000; font-size:0.72rem; letter-spacing:5px; cursor:pointer; transition:all 0.3s; margin:5px; font-family:'Courier New',monospace; }
.btn:hover { background:#55000018; box-shadow:0 0 18px #55000055; color:#cc0000; border-color:#cc0000; }
.btn.dim { border-color:#1a1a1a; color:#1a1a1a; font-size:0.6rem; }
#hud { position:fixed; top:0; left:0; right:0; padding:14px 22px; background:linear-gradient(to bottom,rgba(0,0,0,0.85),transparent); display:flex; justify-content:space-between; align-items:center; pointer-events:none; z-index:10; color:#440000; font-size:0.65rem; letter-spacing:4px; }
#crosshair { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); pointer-events:none; z-index:20; width:20px; height:20px; }
#ch-h,#ch-v { position:absolute; background:rgba(255,255,255,0.38); }
#ch-h { width:14px; height:1px; top:9px; left:3px; }
#ch-v { width:1px; height:14px; top:3px; left:9px; }
#crosshair.aimed #ch-h, #crosshair.aimed #ch-v { background:rgba(255,100,0,0.95); }
#aim-hint { position:fixed; top:57%; left:50%; transform:translateX(-50%); color:#bb3300; font-size:0.6rem; letter-spacing:5px; pointer-events:none; z-index:20; opacity:0; transition:opacity 0.15s; }
#aim-hint.show { opacity:1; }
#item-hint { position:fixed; bottom:80px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.85); border:1px solid #440000; color:#cc4400; font-size:0.8rem; letter-spacing:5px; text-align:center; padding:12px 28px; pointer-events:none; z-index:25; opacity:0; transition:opacity 0.3s; box-shadow:0 0 20px rgba(80,0,0,0.4); max-width:500px; }
#item-hint.show { opacity:1; }
#flash { position:fixed; inset:0; background:#fff; opacity:0; pointer-events:none; z-index:40; }
#diary-screen { position:fixed;inset:0;background:rgba(0,0,0,0.92); display:none;align-items:center;justify-content:center;z-index:55;flex-direction:column; }
#diary-screen.show { display:flex; }
#loader { position:fixed; inset:0; background:#000; z-index:200; display:none; flex-direction:column; align-items:center; justify-content:center; }
#loader-track { width:240px; height:2px; background:#111; margin:18px 0 10px; }
#loader-fill { height:100%; width:0%; background:#550000; transition:width 0.15s; }
#loader-msg { color:#222; font-size:0.58rem; letter-spacing:4px; }
@keyframes flick { 0%,100%{opacity:1} 91%{opacity:1} 92%{opacity:0.2} 93%{opacity:1} 95%{opacity:0.6} 96%{opacity:1} }
</style>
</head>
<body>

<div id="loader">
  <div style="color:#330000;font-size:0.65rem;letter-spacing:6px">載 入 中</div>
  <div id="loader-track"><div id="loader-fill"></div></div>
  <div id="loader-msg">準備中...</div>
</div>

<div id="start-screen">
  <div id="start-title">恐 怖 房 間</div>
  <div id="start-sub">找 到 發 光 的 開 關</div>
  <button class="btn" onclick="startGame()">進 入 房 間</button>
  <button class="btn dim" id="vr-btn">VR 偵 測 中...</button>
</div>

<div id="hud">
  <div style="animation:flick 5s infinite">── 恐 怖 房 間 ──</div>
  <div id="hud-count">── 找 到 開 關 ──</div>
</div>

<div id="crosshair"><div id="ch-h"></div><div id="ch-v"></div></div>
<div id="aim-hint">[ 點 擊 ] 啟 動</div>
<div id="item-hint"></div>
<div id="flash"></div>

<div id="diary-screen">
  <img id="diary-img" src="" style="max-width:85vw;max-height:78vh;border:1px solid #2a1800;box-shadow:0 0 40px rgba(60,20,0,0.8);image-rendering:pixelated;">
  <div style="margin-top:16px;color:#442200;font-size:0.6rem;letter-spacing:5px;animation:flick 3s infinite">— 點 擊 繼 續 —</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

<script>
// ══════════════════════════════════════════════════════════════════
//  核心變數與配置
// ══════════════════════════════════════════════════════════════════
const ITEMS = [
  { name: '古 老 電 話', modelName: 'Old Rotary Telephone', glbFile: 'https://raw.githubusercontent.com/gp01002/room01/main/old_telephone.glb' },
  { name: '破 碎 的 娃 娃', modelName: 'Broken Porcelain Doll', glbFile: 'https://raw.githubusercontent.com/gp01002/room01/main/broken_doll.glb' },
  { name: '音 樂 盒', modelName: 'Antique Music Box', glbFile: 'https://raw.githubusercontent.com/gp01002/room01/main/music%20box%20antique.glb' },
  { name: '染 血 的 鑰 匙', modelName: 'Blood-Stained Key', glbFile: 'https://raw.githubusercontent.com/gp01002/room01/main/old_key_bloodstained.glb' },
  { name: '碎 裂 的 鏡 子', modelName: 'Cracked Mirror', glbFile: 'https://raw.githubusercontent.com/gp01002/room01/main/broken%20mirror.glb' },
  { name: '罐 中 的 眼 睛', modelName: 'Eye in Jar', glbFile: 'https://raw.githubusercontent.com/gp01002/room01/main/eye%20jar.glb' },
  { name: '融 化 的 蠟 燭', modelName: 'Melting Candle', glbFile: 'https://raw.githubusercontent.com/gp01002/room01/main/melting%20candle.glb' },
  { name: '撕 破 的 日 記', modelName: 'Old Book Diary', glbFile: 'https://raw.githubusercontent.com/gp01002/room01/main/old%20book%20diary.glb' },
  { name: '停 止 的 時 鐘', modelName: 'Grandfather Clock', glbFile: 'https://raw.githubusercontent.com/gp01002/room01/main/grandfather%20clock.glb' },
  { name: '無 名 的 骨 頭', modelName: 'Human Skull', glbFile: 'https://raw.githubusercontent.com/gp01002/room01/main/human%20skull.glb' }
];

const SWITCH_COLORS = [0x00aaff, 0xff4400, 0x00ff88, 0xff00cc, 0xffcc00];
const SWITCH_DEFS_WALL = [
  { pos: new THREE.Vector3( 0.5, -0.5, -3.15), rotY: 0, label: '北牆中央' },
  { pos: new THREE.Vector3( 2.78, -0.5, 0.5), rotY: -90, label: '東牆' },
  { pos: new THREE.Vector3(-5.58, -0.5, 0.5), rotY: 90, label: '西牆' },
  { pos: new THREE.Vector3(-1.5, -0.5, 4.9), rotY: 180, label: '南牆' }
];

let scene, camera, renderer, clock, switchGroup, currentItem, xrSession;
let isLocked = false, gameActive = false, yaw = 0, pitch = 0;
const RC = new THREE.Raycaster(); RC.far = 10;
const keys = {};

// ══════════════════════════════════════════════════════════════════
//  初始化
// ══════════════════════════════════════════════════════════════════
function init() {
  scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x050302, 0.05);
  camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
  camera.position.set(0, 0, 2);

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.xr.enabled = true;
  document.body.appendChild(renderer.domElement);

  clock = new THREE.Clock();
  
  // 燈光
  const ambient = new THREE.AmbientLight(0x120e06, 0.3);
  scene.add(ambient);
  
  const ceilingLight = new THREE.PointLight(0xcc6628, 0.6, 15);
  ceilingLight.position.set(0, 2, 0);
  scene.add(ceilingLight);

  window.addEventListener('resize', onWindowResize);
  document.addEventListener('keydown', e => keys[e.code] = true);
  document.addEventListener('keyup', e => keys[e.code] = false);
  document.addEventListener('mousemove', onMouseMove);
  document.addEventListener('mousedown', () => { if(gameActive && isLocked) checkInteraction(); });
  document.getElementById('diary-screen').onclick = closeDiary;

  loadAssets();
}

function loadAssets() {
  const loader = new THREE.GLTFLoader();
  document.getElementById('loader').style.display = 'flex';
  
  // 載入房間
  loader.load('https://raw.githubusercontent.com/gp01002/room01/main/room.glb', gltf => {
    scene.add(gltf.scene);
    // 載入開關模型
    loader.load('https://raw.githubusercontent.com/gp01002/room01/main/dirty_light_switch.glb', powerGltf => {
      window.powerGltfCache = powerGltf;
      document.getElementById('loader').style.display = 'none';
      spawnSwitch();
      checkVR();
      renderer.setAnimationLoop(render);
    });
  });
}

// ══════════════════════════════════════════════════════════════════
//  遊戲邏輯
// ══════════════════════════════════════════════════════════════════
function spawnSwitch() {
  if(switchGroup) scene.remove(switchGroup);
  const def = SWITCH_DEFS_WALL[Math.floor(Math.random() * SWITCH_DEFS_WALL.length)];
  const color = SWITCH_COLORS[Math.floor(Math.random() * SWITCH_COLORS.length)];
  
  switchGroup = new THREE.Group();
  switchGroup.position.copy(def.pos);
  switchGroup.rotation.y = def.rotY * (Math.PI / 180);
  switchGroup.userData = { activated: false, label: def.label };

  // Hitbox
  const hb = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.5, 0.2), new THREE.MeshBasicMaterial({ visible: false }));
  hb.name = "switch_hitbox";
  switchGroup.add(hb);

  if(window.powerGltfCache) {
    const model = window.powerGltfCache.scene.clone();
    model.rotation.x = Math.PI/2;
    model.scale.setScalar(0.002);
    model.traverse(node => {
      if(node.isMesh) {
        node.material = node.material.clone();
        node.material.emissive.setHex(color);
        node.material.emissiveIntensity = 2;
      }
    });
    switchGroup.add(model);
  }
  
  const lp = new THREE.PointLight(color, 0.8, 2);
  lp.position.set(0,0,0.1);
  switchGroup.add(lp);
  
  scene.add(switchGroup);
}

function checkInteraction() {
  RC.setFromCamera({x:0, y:0}, camera);
  const hits = RC.intersectObjects(scene.children, true);
  for(let hit of hits) {
    if(hit.object.name === "switch_hitbox") {
      activateSwitch();
      break;
    }
  }
}

function activateSwitch() {
  if(switchGroup.userData.activated) return;
  switchGroup.userData.activated = true;
  
  flashEffect();
  const idx = Math.floor(Math.random() * ITEMS.length);
  showDiary(idx);
}

function showDiary(idx) {
  const ds = document.getElementById('diary-screen');
  const di = document.getElementById('diary-img');
  di.src = `https://raw.githubusercontent.com/gp01002/room01/main/diary_0${(idx%9)+1}.png`;
  ds.classList.add('show');
  if(document.pointerLockElement) document.exitPointerLock();
}

function closeDiary() {
  document.getElementById('diary-screen').classList.remove('show');
  spawnSwitch();
  if(!xrSession) renderer.domElement.requestPointerLock();
}

// ══════════════════════════════════════════════════════════════════
//  VR 與 渲染
// ══════════════════════════════════════════════════════════════════
async function checkVR() {
  const btn = document.getElementById('vr-btn');
  if(navigator.xr) {
    const supported = await navigator.xr.isSessionSupported('immersive-vr');
    if(supported) {
      btn.textContent = "進入 VR 模式";
      btn.classList.remove('dim');
      btn.onclick = enterVR;
    }
  }
}

async function enterVR() {
  xrSession = await navigator.xr.requestSession('immersive-vr', { requiredFeatures: ['local-floor'] });
  renderer.xr.setSession(xrSession);
  document.getElementById('start-screen').style.display = 'none';
  gameActive = true;
}

function render() {
  const dt = clock.getDelta();
  
  if(gameActive && !xrSession && isLocked) {
    const speed = 3 * dt;
    if(keys['KeyW']) camera.position.addScaledVector(new THREE.Vector3(-Math.sin(yaw), 0, -Math.cos(yaw)), speed);
    if(keys['KeyS']) camera.position.addScaledVector(new THREE.Vector3(-Math.sin(yaw), 0, -Math.cos(yaw)), -speed);
    if(keys['KeyA']) camera.position.addScaledVector(new THREE.Vector3(Math.cos(yaw), 0, -Math.sin(yaw)), -speed);
    if(keys['KeyD']) camera.position.addScaledVector(new THREE.Vector3(Math.cos(yaw), 0, -Math.sin(yaw)), speed);
  }

  // VR 射線互動 (右手 Trigger)
  if(xrSession) {
    const session = renderer.xr.getSession();
    for(const source of session.inputSources) {
      if(source.gamepad && source.gamepad.buttons[0].pressed) {
        checkInteraction(); // VR 模式下檢測
      }
    }
  }

  // 準星與提示
  RC.setFromCamera({x:0, y:0}, camera);
  const hits = RC.intersectObjects(scene.children, true);
  const isAiming = hits.some(h => h.object.name === "switch_hitbox");
  document.getElementById('crosshair').className = isAiming ? 'aimed' : '';
  document.getElementById('aim-hint').className = isAiming ? 'show' : '';

  renderer.render(scene, camera);
}

// 工具函數
function onWindowResize() { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); }
function onMouseMove(e) { if(!isLocked) return; yaw -= e.movementX * 0.002; pitch -= e.movementY * 0.002; pitch = Math.max(-1.5, Math.min(1.5, pitch)); camera.rotation.order = 'YXZ'; camera.rotation.y = yaw; camera.rotation.x = pitch; }
function startGame() { document.getElementById('start-screen').style.display = 'none'; renderer.domElement.requestPointerLock(); gameActive = true; }
function flashEffect() { const f = document.getElementById('flash'); f.style.opacity = '1'; setTimeout(() => f.style.opacity = '0', 100); }
document.addEventListener('pointerlockchange', () => isLocked = document.pointerLockElement === renderer.domElement);

init();
</script>
</body>
</html>
