<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自我觀測儀 - 藝術光影系統</title>
    <!-- 引入 MediaPipe 必要庫 -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            color: white;
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 10;
        }

        #input_video {
            display: none;
        }

        #ui-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 20;
            pointer-events: none;
        }

        .status {
            background: rgba(0, 0, 0, 0.6);
            padding: 12px 18px;
            border-radius: 12px;
            border-left: 4px solid #FFD700;
            backdrop-filter: blur(5px);
        }

        #loading-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: opacity 0.8s;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255, 215, 0, 0.1);
            border-top: 3px solid #FFD700;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="spinner"></div>
        <p style="margin-top: 20px; letter-spacing: 2px;">初始化數位感知系統...</p>
    </div>

    <div id="ui-overlay">
        <div class="status">
            <strong style="color: #FFD700;">自我觀測儀</strong><br>
            <span id="tracker-info" style="font-size: 13px; opacity: 0.8;">請進入攝影機偵測範圍</span>
        </div>
    </div>

    <video id="input_video"></video>
    <canvas id="output_canvas"></canvas>

    <script>
        const videoElement = document.getElementById('input_video');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const loadingScreen = document.getElementById('loading-screen');
        const trackerInfo = document.getElementById('tracker-info');

        let width, height;
        let lightBeams = [];
        let glowingTraces = []; // 金色光暈系統
        let currentHandData = [];
        let currentFaceData = null;
        let beamTriggerCooldown = 0;

        function resize() {
            width = canvasElement.width = window.innerWidth;
            height = canvasElement.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // --- 金色光暈類別 ---
        class GlowingTrace {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.r = 30 + Math.random() * 100;
                this.a = 0.15 + Math.random() * 0.3;
                this.color = randomColor();
                this.vx = (Math.random() - 0.5) * 1;
                this.vy = (Math.random() - 0.5) * 1;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.a *= 0.985;
            }

            draw() {
                // 外層光暈
                const outerGlow = canvasCtx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.r * 1.5);
                outerGlow.addColorStop(0, `rgba(${this.color[0]},${this.color[1]},${this.color[2]},${this.a * 0.8})`);
                outerGlow.addColorStop(0.4, `rgba(${this.color[0]},${this.color[1]},${this.color[2]},${this.a * 0.4})`);
                outerGlow.addColorStop(1, `rgba(${this.color[0]},${this.color[1]},${this.color[2]},0)`);
                
                canvasCtx.beginPath();
                canvasCtx.arc(this.x, this.y, this.r * 1.5, 0, Math.PI * 2);
                canvasCtx.fillStyle = outerGlow;
                canvasCtx.fill();
                
                // 核心金色亮點
                const core = canvasCtx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.r * 0.5);
                core.addColorStop(0, `rgba(255,255,255,${this.a})`);
                core.addColorStop(0.5, `rgba(255,240,200,${this.a * 0.6})`);
                core.addColorStop(1, `rgba(${this.color[0]},${this.color[1]},${this.color[2]},0)`);
                
                canvasCtx.beginPath();
                canvasCtx.arc(this.x, this.y, this.r * 0.5, 0, Math.PI * 2);
                canvasCtx.fillStyle = core;
                canvasCtx.fill();
            }
        }

        function randomColor() {
            const colors = [
                [220, 220, 255], // 冷白
                [255, 220, 220], // 暖白
                [220, 255, 220], // 綠白
                [230, 220, 255], // 紫白
                [255, 240, 220]  // 金白
            ];
            return colors[Math.floor(Math.random() * colors.length)];
        }

        // --- 戲劇化光柱類別 ---
        class DramaticLightBeam {
            constructor(x) {
                this.x = x;
                this.width = 40 + Math.random() * 100;
                this.opacity = 0.8 + Math.random() * 0.2;
                this.life = 1.0;
                this.decay = 0.003 + Math.random() * 0.005;
                this.flicker = Math.random() * Math.PI * 2;
                this.pulseSpeed = 0.05 + Math.random() * 0.1;
                
                this.rays = [];
                for (let i = 0; i < 5; i++) {
                    this.rays.push({
                        offset: (Math.random() - 0.5) * 100,
                        width: 5 + Math.random() * 15,
                        opacity: 0.3 + Math.random() * 0.4
                    });
                }
            }
            
            update() {
                this.life -= this.decay;
                this.flicker += this.pulseSpeed;
                return this.life > 0;
            }
            
            draw() {
                const pulse = Math.sin(this.flicker) * 0.4 + 0.6;
                const currentOpacity = this.opacity * this.life * pulse;
                
                // 主光柱
                const mainGradient = canvasCtx.createRadialGradient(
                    this.x, height / 2, 0,
                    this.x, height / 2, this.width * 1.5
                );
                
                mainGradient.addColorStop(0, `rgba(255,255,255,${currentOpacity})`);
                mainGradient.addColorStop(0.3, `rgba(255,255,240,${currentOpacity * 0.8})`);
                mainGradient.addColorStop(0.6, `rgba(255,240,200,${currentOpacity * 0.4})`);
                mainGradient.addColorStop(1, `rgba(255,220,150,0)`);
                
                canvasCtx.fillStyle = mainGradient;
                canvasCtx.fillRect(this.x - this.width * 1.5, 0, this.width * 3, height);
                
                // 核心超亮光柱
                const coreGradient = canvasCtx.createRadialGradient(
                    this.x, height / 2, 0,
                    this.x, height / 2, this.width * 0.2
                );
                coreGradient.addColorStop(0, `rgba(255,255,255,${Math.min(1, currentOpacity * 1.5)})`);
                coreGradient.addColorStop(0.5, `rgba(255,255,255,${currentOpacity * 0.8})`);
                coreGradient.addColorStop(1, `rgba(255,255,240,0)`);
                
                canvasCtx.fillStyle = coreGradient;
                canvasCtx.fillRect(this.x - this.width * 0.2, 0, this.width * 0.4, height);
                
                // 光芒射線
                this.rays.forEach(ray => {
                    const rayX = this.x + ray.offset;
                    const rayGradient = canvasCtx.createRadialGradient(
                        rayX, height / 2, 0,
                        rayX, height / 2, ray.width
                    );
                    rayGradient.addColorStop(0, `rgba(255,255,255,${currentOpacity * ray.opacity})`);
                    rayGradient.addColorStop(1, `rgba(255,255,200,0)`);
                    
                    canvasCtx.fillStyle = rayGradient;
                    canvasCtx.fillRect(rayX - ray.width, 0, ray.width * 2, height);
                });
                
                // 頂部光源
                const topGlow = canvasCtx.createRadialGradient(this.x, 0, 0, this.x, 0, this.width * 2);
                topGlow.addColorStop(0, `rgba(255,255,255,${currentOpacity * 0.6})`);
                topGlow.addColorStop(0.5, `rgba(255,255,200,${currentOpacity * 0.3})`);
                topGlow.addColorStop(1, `rgba(255,200,100,0)`);
                
                canvasCtx.beginPath();
                canvasCtx.arc(this.x, 0, this.width * 2, 0, Math.PI * 2);
                canvasCtx.fillStyle = topGlow;
                canvasCtx.fill();
                
                // 底部光源
                const bottomGlow = canvasCtx.createRadialGradient(this.x, height, 0, this.x, height, this.width * 2);
                bottomGlow.addColorStop(0, `rgba(255,255,255,${currentOpacity * 0.6})`);
                bottomGlow.addColorStop(0.5, `rgba(255,255,200,${currentOpacity * 0.3})`);
                bottomGlow.addColorStop(1, `rgba(255,200,100,0)`);
                
                canvasCtx.beginPath();
                canvasCtx.arc(this.x, height, this.width * 2, 0, Math.PI * 2);
                canvasCtx.fillStyle = bottomGlow;
                canvasCtx.fill();
            }
        }

        // --- 抽象化的數位痕跡（取代直接骨架）---
        function drawAbstractPresence() {
            // 只繪製抽象的光點，不顯示骨架線條
            canvasCtx.shadowBlur = 15;
            
            // 手部：只顯示關鍵點的光暈
            currentHandData.forEach(hand => {
                [0, 4, 8, 12, 16, 20].forEach(idx => { // 掌心和指尖
                    const pt = hand[idx];
                    const x = (1 - pt.x) * width;
                    const y = pt.y * height;
                    
                    // 微弱的藍色光暈
                    const glow = canvasCtx.createRadialGradient(x, y, 0, x, y, 20);
                    glow.addColorStop(0, 'rgba(0, 242, 255, 0.4)');
                    glow.addColorStop(0.5, 'rgba(0, 212, 255, 0.2)');
                    glow.addColorStop(1, 'rgba(0, 180, 255, 0)');
                    
                    canvasCtx.fillStyle = glow;
                    canvasCtx.beginPath();
                    canvasCtx.arc(x, y, 20, 0, Math.PI * 2);
                    canvasCtx.fill();
                    
                    // 核心小亮點
                    canvasCtx.fillStyle = 'rgba(255, 255, 255, 0.6)';
                    canvasCtx.beginPath();
                    canvasCtx.arc(x, y, 2, 0, Math.PI * 2);
                    canvasCtx.fill();
                });
            });

            // 臉部：只顯示中心點的紫色光暈
            if (currentFaceData) {
                const noseTip = currentFaceData[1];
                const x = (1 - noseTip.x) * width;
                const y = noseTip.y * height;
                
                const faceGlow = canvasCtx.createRadialGradient(x, y, 0, x, y, 40);
                faceGlow.addColorStop(0, 'rgba(188, 0, 255, 0.4)');
                faceGlow.addColorStop(0.5, 'rgba(160, 0, 220, 0.2)');
                faceGlow.addColorStop(1, 'rgba(130, 0, 180, 0)');
                
                canvasCtx.fillStyle = faceGlow;
                canvasCtx.beginPath();
                canvasCtx.arc(x, y, 40, 0, Math.PI * 2);
                canvasCtx.fill();
                
                canvasCtx.fillStyle = 'rgba(255, 255, 255, 0.5)';
                canvasCtx.beginPath();
                canvasCtx.arc(x, y, 3, 0, Math.PI * 2);
                canvasCtx.fill();
            }
            
            canvasCtx.shadowBlur = 0;
        }

        // --- MediaPipe 邏輯 ---
        const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
        hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });

        const faceMesh = new FaceMesh({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}` });
        faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });

        hands.onResults((results) => {
            currentHandData = results.multiHandLandmarks || [];
            
            // 產生金色光暈痕跡
            currentHandData.forEach(hand => {
                [4, 8, 12, 16, 20].forEach(idx => { // 指尖
                    if (Math.random() > 0.7) {
                        const pt = hand[idx];
                        const x = (1 - pt.x) * width;
                        const y = pt.y * height;
                        glowingTraces.push(new GlowingTrace(x, y));
                    }
                });
                
                // 手勢觸發光柱
                if (beamTriggerCooldown <= 0 && Math.random() > 0.9) {
                    const fingerTip = hand[8];
                    const x = (1 - fingerTip.x) * width;
                    lightBeams.push(new DramaticLightBeam(x));
                    beamTriggerCooldown = 80;
                }
            });
        });

        faceMesh.onResults((results) => {
            currentFaceData = results.multiFaceLandmarks ? results.multiFaceLandmarks[0] : null;
            if (currentFaceData) {
                // 臉部產生金色光暈
                if (Math.random() > 0.8) {
                    const x = (1 - currentFaceData[1].x) * width;
                    const y = currentFaceData[1].y * height;
                    glowingTraces.push(new GlowingTrace(x, y));
                }
                
                // 臉部觸發光柱
                if (beamTriggerCooldown <= 0 && Math.random() > 0.96) {
                    const x = (1 - currentFaceData[1].x) * width;
                    lightBeams.push(new DramaticLightBeam(x));
                    beamTriggerCooldown = 100;
                }
            }
        });

        const camera = new Camera(videoElement, {
            onFrame: async () => {
                await hands.send({image: videoElement});
                await faceMesh.send({image: videoElement});
                if (loadingScreen.style.opacity !== '0') {
                    loadingScreen.style.opacity = '0';
                    setTimeout(() => loadingScreen.style.display = 'none', 800);
                }
            },
            width: 1280, height: 720
        });
        camera.start();

        function animate() {
            // 深黑背景
            canvasCtx.globalCompositeOperation = 'source-over';
            canvasCtx.fillStyle = 'rgba(0, 0, 0, 0.3)';
            canvasCtx.fillRect(0, 0, width, height);

            // 1. 繪製光柱（背景層）
            canvasCtx.globalCompositeOperation = 'lighter';
            lightBeams = lightBeams.filter(beam => {
                const alive = beam.update();
                if (alive) beam.draw();
                return alive;
            });

            // 2. 繪製抽象存在感（取代骨架）
            canvasCtx.globalCompositeOperation = 'lighter';
            drawAbstractPresence();

            // 3. 繪製金色光暈痕跡（前景層）
            canvasCtx.globalCompositeOperation = 'lighter';
            glowingTraces = glowingTraces.filter(trace => {
                trace.update();
                trace.draw();
                return trace.a > 0.01;
            });

            // 冷卻計數
            if (beamTriggerCooldown > 0) beamTriggerCooldown--;

            trackerInfo.innerText = currentHandData.length > 0 || currentFaceData 
                ? `系統運作中 | 光暈：${glowingTraces.length} | 光柱：${lightBeams.length}` 
                : "請進入偵測範圍...";

            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
