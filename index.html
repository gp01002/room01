<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>恐怖房間</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; overflow:hidden; font-family:'Courier New',monospace; }
canvas { display:block; }

/* ── START ── */
#start-screen {
  position:fixed; inset:0; background:#000;
  display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:100;
}
#start-title { color:#8b0000; font-size:2.2rem; letter-spacing:14px; text-shadow:0 0 40px #ff0000; animation:flick 3s infinite; margin-bottom:8px; }
#start-sub { color:#252525; font-size:0.68rem; letter-spacing:6px; margin-bottom:50px; }
.btn {
  padding:12px 42px; background:transparent; border:1px solid #550000; color:#550000;
  font-size:0.72rem; letter-spacing:5px; cursor:pointer; transition:all 0.3s; margin:5px;
  font-family:'Courier New',monospace;
}
.btn:hover { background:#55000018; box-shadow:0 0 18px #55000055; color:#cc0000; border-color:#cc0000; }
.btn.dim { border-color:#1a1a1a; color:#1a1a1a; font-size:0.6rem; }

/* ── HUD ── */
#hud {
  position:fixed; top:0; left:0; right:0; padding:14px 22px;
  background:linear-gradient(to bottom,rgba(0,0,0,0.85),transparent);
  display:flex; justify-content:space-between; align-items:center;
  pointer-events:none; z-index:10; color:#440000; font-size:0.65rem; letter-spacing:4px;
}
#hud-right { display:flex; flex-direction:column; align-items:flex-end; gap:4px; }
#hud-count span { color:#cc0000; }
#round-label { color:#222; font-size:0.55rem; letter-spacing:3px; }

/* ── CROSSHAIR ── */
#crosshair { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); pointer-events:none; z-index:20; width:20px; height:20px; }
#ch-h,#ch-v { position:absolute; background:rgba(255,255,255,0.38); }
#ch-h { width:14px; height:1px; top:9px; left:3px; }
#ch-v { width:1px; height:14px; top:3px; left:9px; }
#crosshair.aimed #ch-h, #crosshair.aimed #ch-v { background:rgba(255,100,0,0.95); }
#aim-hint {
  position:fixed; top:57%; left:50%; transform:translateX(-50%);
  color:#bb3300; font-size:0.6rem; letter-spacing:5px;
  pointer-events:none; z-index:20; opacity:0; transition:opacity 0.15s;
}
#aim-hint.show { opacity:1; }

/* ── COUNTDOWN ── */
#countdown-wrap {
  position:fixed; bottom:30px; left:50%; transform:translateX(-50%);
  pointer-events:none; z-index:15; text-align:center; display:none;
}
#countdown-num { color:#8b0000; font-size:3rem; letter-spacing:8px; text-shadow:0 0 30px #ff0000; animation:flick 0.8s infinite; }
#countdown-label { color:#333; font-size:0.55rem; letter-spacing:5px; margin-top:4px; }

/* ── REVEAL ── */
#reveal-screen {
  position:fixed; inset:0; background:rgba(0,0,0,0.93);
  display:none; flex-direction:column; align-items:center; justify-content:center; z-index:50;
}
#reveal-screen.show { display:flex; animation:fadeIn 0.2s; }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
#reveal-wrap { animation:glitchIn 0.4s forwards; }
@keyframes glitchIn {
  0%  { transform:scale(2.5) skewX(8deg); opacity:0; filter:blur(14px) hue-rotate(180deg); }
  55% { transform:scale(0.97); opacity:1; filter:blur(1px); }
  80% { transform:scale(1.03); }
  100%{ transform:scale(1); filter:blur(0); }
}
#reveal-item-name { color:#8b0000; font-size:0.75rem; letter-spacing:8px; margin-top:18px; text-shadow:0 0 20px #ff0000; animation:flick 2s infinite; }
#reveal-model-hint { color:#222; font-size:0.5rem; letter-spacing:4px; margin-top:8px; }
#close-btn {
  margin-top:22px; padding:9px 34px; background:transparent;
  border:1px solid #330000; color:#550000; font-size:0.7rem; letter-spacing:5px;
  cursor:pointer; font-family:'Courier New',monospace; transition:all 0.3s;
}
#close-btn:hover { border-color:#cc0000; color:#cc0000; }

/* ── BLACKOUT ── */
#blackout {
  position:fixed; inset:0; background:#000; opacity:0;
  pointer-events:none; z-index:60; transition:opacity 0.8s;
}
#blackout.fade { opacity:1; }

/* ── NEW ROUND ── */
#new-round-msg {
  position:fixed; inset:0; background:#000;
  display:none; flex-direction:column; align-items:center; justify-content:center; z-index:80;
}
#new-round-msg.show { display:flex; }
#nr-title { color:#330000; font-size:1.2rem; letter-spacing:10px; animation:flick 2s infinite; margin-bottom:10px; }
#nr-sub { color:#1a1a1a; font-size:0.6rem; letter-spacing:5px; }

/* ── HINT BAR ── */
#hint-bar { position:fixed; bottom:18px; left:50%; transform:translateX(-50%); color:#1a1a1a; font-size:0.52rem; letter-spacing:3px; pointer-events:none; z-index:10; }

#flash { position:fixed; inset:0; background:#fff; opacity:0; pointer-events:none; z-index:40; }

/* ── MOBILE JOY ── */
#joy-zone { position:fixed; bottom:50px; left:30px; z-index:15; display:none; }
#joy-base { width:90px; height:90px; border-radius:50%; border:1px solid #222; background:rgba(0,0,0,0.5); position:relative; touch-action:none; }
#joy-thumb { width:34px; height:34px; border-radius:50%; background:rgba(100,0,0,0.4); border:1px solid #440000; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); pointer-events:none; }

/* ── LOADER ── */
#loader { position:fixed; inset:0; background:#000; z-index:200; display:none; flex-direction:column; align-items:center; justify-content:center; }
#loader-track { width:240px; height:2px; background:#111; margin:18px 0 10px; }
#loader-fill { height:100%; width:0%; background:#550000; transition:width 0.15s; }
#loader-msg { color:#222; font-size:0.58rem; letter-spacing:4px; }
#loader-skip { margin-top:28px; padding:8px 28px; background:transparent; border:1px solid #181818; color:#181818; font-size:0.55rem; letter-spacing:4px; cursor:pointer; font-family:'Courier New',monospace; display:none; }
#loader-skip:hover { border-color:#440000; color:#440000; }

@keyframes flick {
  0%,100%{opacity:1} 91%{opacity:1} 92%{opacity:0.2} 93%{opacity:1} 95%{opacity:0.6} 96%{opacity:1}
}
</style>
</head>
<body>

<div id="loader">
  <div style="color:#330000;font-size:0.65rem;letter-spacing:6px">載 入 中</div>
  <div id="loader-track"><div id="loader-fill"></div></div>
  <div id="loader-msg">準備中...</div>
  <button id="loader-skip" onclick="skipLoader()">略 過</button>
</div>

<div id="start-screen">
  <div id="start-title">恐 怖 房 間</div>
  <div id="start-sub">找 到 發 光 的 開 關</div>
  <button class="btn" onclick="startGame()">進 入 房 間</button>
  <button class="btn dim" id="vr-btn">VR 偵 測 中...</button>
</div>

<div id="hud">
  <div style="animation:flick 5s infinite">── 恐 怖 房 間 ──</div>
  <div id="hud-right">
    <div id="hud-count">開 關 &nbsp;<span id="found-count">0</span>&nbsp;/&nbsp;3</div>
    <div id="round-label">第 <span id="round-num">1</span> 輪</div>
  </div>
</div>

<div id="crosshair"><div id="ch-h"></div><div id="ch-v"></div></div>
<div id="aim-hint">[ 點 擊 ] 啟 動</div>

<div id="countdown-wrap">
  <div id="countdown-num">10</div>
  <div id="countdown-label">燈 即 將 熄 滅</div>
</div>

<div id="hint-bar">WASD 走 動 &nbsp;|&nbsp; 滑 鼠 轉 向 &nbsp;|&nbsp; 靠 近 發 光 方 塊 點 擊</div>
<div id="move-indicator" style="position:fixed;top:50%;right:22px;transform:translateY(-50%);pointer-events:none;z-index:15;display:flex;flex-direction:column;gap:3px;opacity:0;transition:opacity 0.2s;">
  <div id="mi-n"  style="width:28px;height:28px;border:1px solid #333;display:flex;align-items:center;justify-content:center;font-size:10px;color:#333;background:rgba(0,0,0,0.5)">▲</div>
  <div style="display:flex;gap:3px">
    <div id="mi-l" style="width:28px;height:28px;border:1px solid #333;display:flex;align-items:center;justify-content:center;font-size:10px;color:#333;background:rgba(0,0,0,0.5)">◀</div>
    <div id="mi-s" style="width:28px;height:28px;border:1px solid #333;display:flex;align-items:center;justify-content:center;font-size:10px;color:#333;background:rgba(0,0,0,0.5)">▼</div>
    <div id="mi-r" style="width:28px;height:28px;border:1px solid #333;display:flex;align-items:center;justify-content:center;font-size:10px;color:#333;background:rgba(0,0,0,0.5)">▶</div>
  </div>
</div>
<div id="flash"></div>

<!-- REVEAL OVERLAY -->
<div id="reveal-screen">
  <div id="reveal-wrap">
    <canvas id="reveal-canvas" width="420" height="340"></canvas>
  </div>
  <div id="reveal-item-name"></div>
  <div id="reveal-model-hint"></div>
  <button id="close-btn" onclick="closeReveal()">關 閉</button>
</div>

<!-- BLACKOUT -->
<div id="blackout"></div>

<!-- NEW ROUND MSG -->
<div id="new-round-msg">
  <div id="nr-title">燈 熄 了</div>
  <div id="nr-sub">下 一 輪 開 始...</div>
</div>

<!-- MOBILE -->
<div id="joy-zone">
  <div id="joy-base"><div id="joy-thumb"></div></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script>
// ══════════════════════════════════════════════════════════════════
//  10 HORROR ITEMS  (canvas placeholder + model info)
// ══════════════════════════════════════════════════════════════════
const ITEMS = [
  {
    name: '古 老 電 話',
    modelName: 'Old Rotary Telephone',
    modelUrl: 'https://sketchfab.com/3d-models/rotary-phone-c00e98e8a99f4f5e92dd6d7ff3680a2e',
    color: ['#1a0d00','#3a1800','#5a2800'],
    draw: (ctx,w,h) => {
      ctx.fillStyle='#0a0600'; ctx.fillRect(0,0,w,h);
      // Body
      ctx.fillStyle='#2a1200'; ctx.beginPath(); ctx.roundRect(w*.2,h*.3,w*.6,h*.35,20); ctx.fill();
      ctx.strokeStyle='#4a2200'; ctx.lineWidth=2; ctx.stroke();
      // Dial
      ctx.beginPath(); ctx.arc(w*.5,h*.48,h*.12,0,Math.PI*2); ctx.fillStyle='#1a0a00'; ctx.fill();
      ctx.strokeStyle='#3a1800'; ctx.lineWidth=1.5; ctx.stroke();
      for(let i=0;i<12;i++){const a=i/12*Math.PI*2; ctx.beginPath(); ctx.arc(w*.5+Math.cos(a)*h*.09,h*.48+Math.sin(a)*h*.09,3,0,Math.PI*2); ctx.fillStyle='#553300'; ctx.fill();}
      // Handset
      ctx.strokeStyle='#3a1800'; ctx.lineWidth=8; ctx.lineCap='round';
      ctx.beginPath(); ctx.moveTo(w*.22,h*.28); ctx.bezierCurveTo(w*.3,h*.18,w*.7,h*.18,w*.78,h*.28); ctx.stroke();
      // Red glow
      const g=ctx.createRadialGradient(w*.5,h*.5,0,w*.5,h*.5,w*.4);
      g.addColorStop(0,'rgba(100,20,0,0.15)'); g.addColorStop(1,'transparent');
      ctx.fillStyle=g; ctx.fillRect(0,0,w,h);
      // Label
      ctx.fillStyle='#553300'; ctx.font=`${h*.055}px Courier New`; ctx.textAlign='center';
      ctx.fillText('[ placeholder: old_telephone.glb ]',w*.5,h*.88);
    }
  },
  {
    name: '破 碎 的 娃 娃',
    modelName: 'Broken Porcelain Doll',
    modelUrl: 'https://sketchfab.com/3d-models/creepy-doll-b5e2a63b7e6748f5a7c44dcf5eaef8d3',
    color: ['#0d0d1a','#1a1a3a','#2a2a55'],
    draw: (ctx,w,h) => {
      ctx.fillStyle='#080810'; ctx.fillRect(0,0,w,h);
      // Head
      ctx.beginPath(); ctx.ellipse(w*.5,h*.3,h*.15,h*.17,0,0,Math.PI*2);
      ctx.fillStyle='#c8b090'; ctx.fill(); ctx.strokeStyle='#3a3060'; ctx.lineWidth=2; ctx.stroke();
      // Crack on face
      ctx.strokeStyle='#000'; ctx.lineWidth=2; ctx.beginPath();
      ctx.moveTo(w*.48,h*.18); ctx.lineTo(w*.45,h*.28); ctx.lineTo(w*.5,h*.32); ctx.stroke();
      // Eyes — one missing
      ctx.beginPath(); ctx.arc(w*.44,h*.27,5,0,Math.PI*2); ctx.fillStyle='#1a0a2a'; ctx.fill();
      ctx.beginPath(); ctx.arc(w*.56,h*.27,5,0,Math.PI*2); ctx.fillStyle='#000'; ctx.fill(); // empty socket
      ctx.strokeStyle='#330022'; ctx.lineWidth=1; ctx.stroke();
      // Body
      ctx.fillStyle='#2a1a3a'; ctx.beginPath(); ctx.roundRect(w*.35,h*.46,w*.3,h*.28,8); ctx.fill();
      ctx.strokeStyle='#4a3060'; ctx.lineWidth=1.5; ctx.stroke();
      // Arms
      ctx.strokeStyle='#c8b090'; ctx.lineWidth=6; ctx.lineCap='round';
      ctx.beginPath(); ctx.moveTo(w*.35,h*.5); ctx.lineTo(w*.22,h*.62); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(w*.65,h*.5); ctx.lineTo(w*.78,h*.58); ctx.stroke(); // broken arm
      // Glow
      const g=ctx.createRadialGradient(w*.5,h*.5,0,w*.5,h*.5,w*.45);
      g.addColorStop(0,'rgba(60,0,80,0.2)'); g.addColorStop(1,'transparent');
      ctx.fillStyle=g; ctx.fillRect(0,0,w,h);
      ctx.fillStyle='#332244'; ctx.font=`${h*.055}px Courier New`; ctx.textAlign='center';
      ctx.fillText('[ placeholder: broken_doll.glb ]',w*.5,h*.88);
    }
  },
  {
    name: '音 樂 盒',
    modelName: 'Antique Music Box',
    modelUrl: 'https://sketchfab.com/3d-models/music-box-7d3a88bdd4454e2a9c6acbe3e19cc4ec',
    color: ['#0d0800','#1a1000','#2a1a00'],
    draw: (ctx,w,h) => {
      ctx.fillStyle='#080600'; ctx.fillRect(0,0,w,h);
      // Box body
      const grad=ctx.createLinearGradient(w*.2,h*.4,w*.8,h*.75);
      grad.addColorStop(0,'#3a2800'); grad.addColorStop(1,'#1a1200');
      ctx.fillStyle=grad; ctx.beginPath(); ctx.roundRect(w*.2,h*.42,w*.6,h*.3,8); ctx.fill();
      ctx.strokeStyle='#6a4800'; ctx.lineWidth=2; ctx.stroke();
      // Lid open
      ctx.fillStyle='#2a1e00';
      ctx.beginPath(); ctx.moveTo(w*.2,h*.42); ctx.lineTo(w*.5,h*.2); ctx.lineTo(w*.8,h*.42); ctx.closePath(); ctx.fill();
      ctx.strokeStyle='#5a3c00'; ctx.lineWidth=1.5; ctx.stroke();
      // Ballerina silhouette
      ctx.fillStyle='#8a6040';
      ctx.beginPath(); ctx.ellipse(w*.5,h*.3,6,8,0,0,Math.PI*2); ctx.fill(); // head
      ctx.beginPath(); ctx.moveTo(w*.5,h*.38); ctx.lineTo(w*.47,h*.5); ctx.lineTo(w*.53,h*.5); ctx.closePath(); ctx.fill();
      // Gold inlay decorations
      ctx.strokeStyle='#8a6200'; ctx.lineWidth=1;
      for(let i=0;i<5;i++){ctx.beginPath();ctx.moveTo(w*.24+i*w*.1,h*.44);ctx.lineTo(w*.24+i*w*.1,h*.7);ctx.stroke();}
      // Warm glow
      const g=ctx.createRadialGradient(w*.5,h*.4,0,w*.5,h*.4,w*.4);
      g.addColorStop(0,'rgba(120,60,0,0.25)'); g.addColorStop(1,'transparent');
      ctx.fillStyle=g; ctx.fillRect(0,0,w,h);
      ctx.fillStyle='#5a3c00'; ctx.font=`${h*.055}px Courier New`; ctx.textAlign='center';
      ctx.fillText('[ placeholder: music_box.glb ]',w*.5,h*.88);
    }
  },
  {
    name: '染 血 的 鑰 匙',
    modelName: 'Blood-Stained Key',
    modelUrl: 'https://sketchfab.com/3d-models/old-key-bloodstained-free-3d-model-df3d2f4dd8c34cd1b9fa81c6a0c2d6f8',
    color: ['#1a0000','#2a0000','#3a0000'],
    draw: (ctx,w,h) => {
      ctx.fillStyle='#0a0000'; ctx.fillRect(0,0,w,h);
      // Key bow (ring top)
      ctx.beginPath(); ctx.arc(w*.5,h*.32,h*.12,0,Math.PI*2); ctx.strokeStyle='#8a7050'; ctx.lineWidth=10; ctx.stroke();
      ctx.beginPath(); ctx.arc(w*.5,h*.32,h*.07,0,Math.PI*2); ctx.strokeStyle='#0a0000'; ctx.lineWidth=6; ctx.stroke();
      // Shaft
      ctx.strokeStyle='#9a8060'; ctx.lineWidth=8; ctx.lineCap='round';
      ctx.beginPath(); ctx.moveTo(w*.5,h*.44); ctx.lineTo(w*.5,h*.72); ctx.stroke();
      // Teeth
      ctx.lineWidth=5;
      ctx.beginPath(); ctx.moveTo(w*.5,h*.54); ctx.lineTo(w*.6,h*.54); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(w*.5,h*.62); ctx.lineTo(w*.65,h*.62); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(w*.5,h*.68); ctx.lineTo(w*.58,h*.68); ctx.stroke();
      // Blood drips
      ctx.fillStyle='rgba(150,0,0,0.8)';
      ctx.beginPath(); ctx.ellipse(w*.5,h*.58,4,8,0.2,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(w*.55,h*.65,3,6,-0.1,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(w*.48,h*.72,2,5,0,0,Math.PI*2); ctx.fill();
      const g=ctx.createRadialGradient(w*.5,h*.5,0,w*.5,h*.5,w*.35);
      g.addColorStop(0,'rgba(80,0,0,0.3)'); g.addColorStop(1,'transparent');
      ctx.fillStyle=g; ctx.fillRect(0,0,w,h);
      ctx.fillStyle='#3a1010'; ctx.font=`${h*.055}px Courier New`; ctx.textAlign='center';
      ctx.fillText('[ placeholder: bloody_key.glb ]',w*.5,h*.88);
    }
  },
  {
    name: '碎 裂 的 鏡 子',
    modelName: 'Cracked Mirror',
    modelUrl: 'https://sketchfab.com/3d-models/broken-mirror-dcf5c0e5e5864b7e9fe8a7af04e5c4a1',
    color: ['#0a0a10','#10101a','#1a1a2a'],
    draw: (ctx,w,h) => {
      ctx.fillStyle='#06060c'; ctx.fillRect(0,0,w,h);
      // Mirror frame
      ctx.strokeStyle='#3a3a2a'; ctx.lineWidth=12; ctx.lineJoin='round';
      ctx.strokeRect(w*.18,h*.12,w*.64,h*.68);
      // Mirror surface - shattered
      ctx.fillStyle='#0d0d14'; ctx.fillRect(w*.18,h*.12,w*.64,h*.68);
      // Shatter lines from center
      const cx=w*.5, cy=h*.45;
      ctx.strokeStyle='rgba(180,180,220,0.35)'; ctx.lineWidth=1.5;
      for(let i=0;i<12;i++){
        const a=i/12*Math.PI*2;
        const len=Math.random()*h*.25+h*.05;
        ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(cx+Math.cos(a)*len,cy+Math.sin(a)*len); ctx.stroke();
      }
      // Glass shard highlights
      ctx.strokeStyle='rgba(200,200,255,0.2)'; ctx.lineWidth=0.5;
      for(let i=0;i<8;i++){
        ctx.beginPath(); ctx.moveTo(w*.2+Math.random()*w*.6,h*.14+Math.random()*h*.64);
        ctx.lineTo(w*.2+Math.random()*w*.6,h*.14+Math.random()*h*.64); ctx.stroke();
      }
      // Dark reflection (silhouette of someone)
      ctx.fillStyle='rgba(0,0,0,0.6)';
      ctx.beginPath(); ctx.ellipse(cx,cy-h*.08,h*.06,h*.08,0,0,Math.PI*2); ctx.fill();
      ctx.fillRect(cx-h*.04,cy,h*.08,h*.18);
      // Blue glow
      const g=ctx.createRadialGradient(cx,cy,0,cx,cy,w*.35);
      g.addColorStop(0,'rgba(30,30,80,0.4)'); g.addColorStop(1,'transparent');
      ctx.fillStyle=g; ctx.fillRect(0,0,w,h);
      ctx.fillStyle='#2a2a44'; ctx.font=`${h*.055}px Courier New`; ctx.textAlign='center';
      ctx.fillText('[ placeholder: cracked_mirror.glb ]',w*.5,h*.92);
    }
  },
  {
    name: '罐 中 的 眼 睛',
    modelName: 'Eye in Jar',
    modelUrl: 'https://sketchfab.com/3d-models/eye-in-jar-horror-prop-9e5b4d3a7c2f41e8b6a1d5e9f3c7a2b8',
    color: ['#001a00','#002a00','#003a00'],
    draw: (ctx,w,h) => {
      ctx.fillStyle='#000d00'; ctx.fillRect(0,0,w,h);
      // Jar body
      const jg=ctx.createLinearGradient(w*.3,0,w*.7,0);
      jg.addColorStop(0,'rgba(100,150,100,0.15)'); jg.addColorStop(0.5,'rgba(150,200,150,0.25)'); jg.addColorStop(1,'rgba(100,150,100,0.15)');
      ctx.fillStyle=jg; ctx.beginPath(); ctx.roundRect(w*.28,h*.2,w*.44,h*.55,12); ctx.fill();
      ctx.strokeStyle='rgba(100,150,100,0.4)'; ctx.lineWidth=2; ctx.stroke();
      // Lid
      ctx.fillStyle='#2a1800'; ctx.beginPath(); ctx.roundRect(w*.3,h*.16,w*.4,h*.07,4); ctx.fill();
      ctx.strokeStyle='#4a3000'; ctx.lineWidth=1.5; ctx.stroke();
      // Liquid
      ctx.fillStyle='rgba(0,60,10,0.5)'; ctx.fillRect(w*.29,h*.55,w*.42,h*.19);
      // THE EYE

function showLoader(msg){ document.getElementById('loader').style.display='flex'; document.getElementById('loader-msg').textContent=msg; }
function loaderPct(p,m){ document.getElementById('loader-fill').style.width=p+'%'; if(m) document.getElementById('loader-msg').textContent=m; }
function hideLoader(){ document.getElementById('loader').style.display='none'; }
function skipLoader(){ skipRequested=true; }

function initThree(){
  scene=new THREE.Scene(); scene.fog=new THREE.FogExp2(0x050302,0.025);
  camera=new THREE.PerspectiveCamera(72,innerWidth/innerHeight,0.05,60);
  camera.position.set(0,0,4); camera.rotation.order='YXZ';
  renderer=new THREE.WebGLRenderer({antialias:true});
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  renderer.setSize(innerWidth,innerHeight);
  renderer.shadowMap.enabled=true;
  document.body.insertBefore(renderer.domElement,document.body.firstChild);
  clock=new THREE.Clock();
  window.addEventListener('resize',()=>{ camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth,innerHeight); });
  document.addEventListener('mousemove',onMouseMove);
  document.addEventListener('click',onClick);
  document.addEventListener('pointerlockchange',()=>{ isLocked=document.pointerLockElement===renderer.domElement; });
  setupTouch();

  loadRoomGLB().then(()=>{
    buildSwitches();
    buildAtmosphere();
    checkVR();
    renderer.setAnimationLoop(render);
    hideLoader();
  });
}

// ══════════════════════════════════════════════════════════════════
//  GLB LOADER
// ══════════════════════════════════════════════════════════════════
const ROOM_URL='https://raw.githubusercontent.com/gp01002/room01/main/room.glb';

function loadRoomGLB(){
  return new Promise(resolve=>{
    if(typeof THREE.GLTFLoader==='undefined'){ buildProceduralRoom(); resolve(); return; }
    showLoader('room.glb 載入中...');
    setTimeout(()=>document.getElementById('loader-skip').style.display='block',2000);
    let done=false, lastProg=Date.now();
    const hardTid=setTimeout(()=>fin(null,'超時，使用預設房間'),8000);
    const noRespTid=setTimeout(()=>{ if(Date.now()-lastProg>2800)fin(null,'無回應，使用預設'); },3000);
    const pollId=setInterval(()=>{ if(skipRequested)fin(null,'略過'); },200);
    function fin(g,msg){ if(done)return; done=true; clearTimeout(hardTid);clearTimeout(noRespTid);clearInterval(pollId); loaderPct(100,msg); if(g)placeRoom(g); else buildProceduralRoom(); resolve(); }
    new THREE.GLTFLoader().load(ROOM_URL,
      g=>fin(g,'room.glb ✓'),
      p=>{ lastProg=Date.now(); if(p.total>0) loaderPct(Math.round(p.loaded/p.total*100),'room.glb '+Math.round(p.loaded/p.total*100)+'%'); },
      e=>fin(null,'room.glb 失敗，使用預設')
    );
  });
}

function placeRoom(gltf){
  const m=gltf.scene;
  const box=new THREE.Box3().setFromObject(m);
  const s=14/Math.max(...box.getSize(new THREE.Vector3()).toArray());
  m.scale.setScalar(s); box.setFromObject(m);
  const c=box.getCenter(new THREE.Vector3());
  m.position.set(-c.x,-box.min.y-2.5,-c.z);
  m.traverse(ch=>{ if(ch.isMesh){ const ms=Array.isArray(ch.material)?ch.material:[ch.material]; ms.forEach(mat=>{ if(mat.color)mat.color.multiplyScalar(0.55); }); }});
  scene.add(m);
  buildDoor(new THREE.Vector3(2.5,-0.5,-6.9));
}

// ══════════════════════════════════════════════════════════════════
//  PROCEDURAL ROOM
// ══════════════════════════════════════════════════════════════════
function makeTex(fn){ const c=document.createElement('canvas'); c.width=512; c.height=512; fn(c.getContext('2d')); const t=new THREE.CanvasTexture(c); t.wrapS=t.wrapT=THREE.RepeatWrapping; return t; }

function buildProceduralRoom(){
  const W=10,H=5,D=14;
  const wt=makeTex(x=>{ x.fillStyle='#1e1a16';x.fillRect(0,0,512,512); for(let y=0;y<512;y+=40){x.fillStyle=y%80?'#221e1a':'#281e18';x.fillRect(0,y,512,40);} x.strokeStyle='#2a2420';x.lineWidth=.5; for(let y=0;y<512;y+=40)for(let i=0;i<512;i+=30)x.strokeRect(i+4,y+4,22,32); }); wt.repeat.set(3,2);
  const ft=makeTex(x=>{ x.fillStyle='#14100a';x.fillRect(0,0,512,512); for(let y=0;y<512;y+=64)for(let i=0;i<512;i+=192){x.fillStyle=`hsl(20,15%,${9+Math.random()*3}%)`;x.fillRect(i+1,y+1,190,62);x.strokeStyle='#0a0804';x.lineWidth=2;x.strokeRect(i+1,y+1,190,62);} }); ft.repeat.set(4,5);
  const wm=new THREE.MeshBasicMaterial({map:wt,side:THREE.BackSide});
  const fm=new THREE.MeshBasicMaterial({map:ft});
  const cm=new THREE.MeshBasicMaterial({color:0x101010,side:THREE.BackSide});
  scene.add(new THREE.Mesh(new THREE.BoxGeometry(W,H,D),[wm,wm,cm,fm,wm,wm]));
  const sk=new THREE.MeshBasicMaterial({color:0x121008});
  for(const z of[-D/2+.02,D/2-.02]){const b=new THREE.Mesh(new THREE.BoxGeometry(W,.16,.03),sk);b.position.set(0,-H/2+.08,z);scene.add(b);}
  for(const x of[-W/2+.02,W/2-.02]){const b=new THREE.Mesh(new THREE.BoxGeometry(.03,.16,D),sk);b.position.set(x,-H/2+.08,0);scene.add(b);}
  buildDoor(new THREE.Vector3(2.5,-0.5,-D/2+.05));
  buildPainting(0,0.7,D/2-.06);
  buildCabinet(-4.3,-H/2,-1.5);
}

function buildDoor(pos){
  const mat=new THREE.MeshBasicMaterial({color:0x1a1206});
  const door=new THREE.Mesh(new THREE.BoxGeometry(1.4,3,.09),mat); door.position.copy(pos); scene.add(door);
  const ec=document.createElement('canvas'); ec.width=256; ec.height=512;
  // simple door eye canvas
  const ctx=ec.getContext('2d'); ctx.fillStyle='#000'; ctx.fillRect(0,0,256,512);
  ctx.fillStyle='#0c0702'; ctx.fillRect(0,0,100,512);
  doorEyesMesh=new THREE.Mesh(new THREE.PlaneGeometry(1.4,3),new THREE.MeshBasicMaterial({map:new THREE.CanvasTexture(ec),transparent:true,opacity:0}));
  doorEyesMesh.position.set(pos.x,pos.y,pos.z+.07); scene.add(doorEyesMesh);
}
function buildPainting(x,y,z){
  const fr=new THREE.Mesh(new THREE.PlaneGeometry(2.4,2),new THREE.MeshBasicMaterial({color:0x1a0d0a})); fr.position.set(x,y,z); fr.rotation.y=Math.PI; scene.add(fr);
}
function buildCabinet(x,fy,z){
  const m=new THREE.MeshBasicMaterial({color:0x1a1208}); const c=new THREE.Mesh(new THREE.BoxGeometry(1.2,1.6,.6),m); c.position.set(x,fy+.8,z); scene.add(c);
}

// ══════════════════════════════════════════════════════════════════
//  GLOWING CUBE SWITCHES  ← 3 switches, each a coloured glowing cube
// ══════════════════════════════════════════════════════════════════
const SWITCH_DEFS=[
  { pos:new THREE.Vector3(-4.8, 0.5,-2.0), rot:new THREE.Euler(0, Math.PI/2,0),  color:0x00aaff, glowColor:0x0044ff },
  { pos:new THREE.Vector3(-0.5, 0.8,-6.7), rot:new THREE.Euler(0, 0,         0), color:0xff4400, glowColor:0xff0000 },
  { pos:new THREE.Vector3( 4.8,-0.4, 1.5), rot:new THREE.Euler(0,-Math.PI/2,0),  color:0x00ff88, glowColor:0x00aa44 },
];

function buildSwitches(){
  SWITCH_DEFS.forEach((def,i)=>{
    const g=new THREE.Group();

    // Glowing cube — MeshBasicMaterial so it appears lit regardless of lights
    const cubeMat=new THREE.MeshBasicMaterial({ color:def.color });
    const cube=new THREE.Mesh(new THREE.BoxGeometry(0.3,0.3,0.3), cubeMat);
    cube.name='cube';
    g.add(cube);

    // Pulsing point light
    const light=new THREE.PointLight(def.glowColor, 1.2, 4, 2);
    g.add(light);
    g.userData.light=light;

    // Wireframe outline
    const wireMat=new THREE.MeshBasicMaterial({ color:0xffffff, wireframe:true, transparent:true, opacity:0.2 });
    g.add(new THREE.Mesh(new THREE.BoxGeometry(0.32,0.32,0.32), wireMat));

    // Large invisible hitbox
    const hitbox=new THREE.Mesh(new THREE.BoxGeometry(1.0,1.0,0.8), new THREE.MeshBasicMaterial({visible:false}));
    hitbox.name='hit';
    g.add(hitbox);

    g.position.copy(def.pos);
    g.rotation.copy(def.rot);
    g.userData={ id:i, activated:false, cube };
    scene.add(g);
    switchGroups.push(g);
  });
}

// ══════════════════════════════════════════════════════════════════
//  ATMOSPHERE  (no flashlight)
// ══════════════════════════════════════════════════════════════════
function buildAtmosphere(){
  scene.add(new THREE.AmbientLight(0x2a2018, 3.5));

  ceilingLight=new THREE.PointLight(0xcc7830,4.5,22,1.5);
  ceilingLight.position.set(0,2.3,0); ceilingLight.castShadow=true;
  scene.add(ceilingLight);

  const bulb=new THREE.Mesh(new THREE.SphereGeometry(.06,8,8),new THREE.MeshBasicMaterial({color:0xaa6030}));
  bulb.position.copy(ceilingLight.position); scene.add(bulb);

  // Fill lights at corners so room isn't pitch black
  const fill1=new THREE.PointLight(0x4a3015,2.5,18,1.5); fill1.position.set(-4,1.5,-5); scene.add(fill1);
  const fill2=new THREE.PointLight(0x4a3015,2.5,18,1.5); fill2.position.set( 4,1.5, 4); scene.add(fill2);

  // Dust particles
  const pa=new Float32Array(160*3);
  for(let i=0;i<160;i++){pa[i*3]=(Math.random()-.5)*9;pa[i*3+1]=(Math.random()-.5)*4;pa[i*3+2]=(Math.random()-.5)*13;}
  const pg=new THREE.BufferGeometry(); pg.setAttribute('position',new THREE.BufferAttribute(pa,3));
  scene.add(new THREE.Points(pg,new THREE.PointsMaterial({color:0x1a1a1a,size:.025,transparent:true,opacity:.6})));
}

// ══════════════════════════════════════════════════════════════════
//  RENDER LOOP
// ══════════════════════════════════════════════════════════════════
function render(){
  const dt=clock.getDelta(); t+=dt;

  // Ceiling flicker
  if(ceilingLight) ceilingLight.intensity=4.0+Math.sin(t*.9)*.2+(Math.random()<.003?-0.5:0);

  // Cube pulse animation
  switchGroups.forEach(sw=>{
    if(!sw.userData.activated){
      const sc=1+Math.sin(t*2.5+sw.userData.id)*0.06;
      sw.userData.cube.scale.setScalar(sc);
      if(sw.userData.light) sw.userData.light.intensity=1.0+Math.sin(t*2.5+sw.userData.id)*.5;
    }
  });

  // WASD
  if(gameActive&&isLocked){
    const spd=3.5*dt;
    const fwd=new THREE.Vector3(-Math.sin(yaw),0,-Math.cos(yaw));
    const right=new THREE.Vector3(Math.cos(yaw),0,-Math.sin(yaw));
    if(keys['KeyW']||keys['ArrowUp'])   camera.position.addScaledVector(fwd,spd);
    if(keys['KeyS']||keys['ArrowDown']) camera.position.addScaledVector(fwd,-spd);
    if(keys['KeyA']||keys['ArrowLeft']) camera.position.addScaledVector(right,-spd);
    if(keys['KeyD']||keys['ArrowRight'])camera.position.addScaledVector(right,spd);
  }
  // Joystick
  if(gameActive&&(joy.x||joy.y)){
    const spd=3*dt;
    const fwd=new THREE.Vector3(-Math.sin(yaw),0,-Math.cos(yaw));
    const right=new THREE.Vector3(Math.cos(yaw),0,-Math.sin(yaw));
    camera.position.addScaledVector(fwd,-joy.y*spd);
    camera.position.addScaledVector(right,joy.x*spd);
  }
  camera.position.x=Math.max(-4.4,Math.min(4.4,camera.position.x));
  camera.position.z=Math.max(-6.6,Math.min(6.6,camera.position.z));

  // Head bob when moving
  const isMoving=(keys['KeyW']||keys['KeyS']||keys['KeyA']||keys['KeyD']||keys['ArrowUp']||keys['ArrowDown']||keys['ArrowLeft']||keys['ArrowRight']||joy.x||joy.y);
  camera.position.y = isMoving ? Math.sin(t*7)*0.04 : 0;

  // Crosshair aim
  if(gameActive){
    const sw=getAimedSwitch();
    document.getElementById('crosshair').className=sw?'aimed':'';
    document.getElementById('aim-hint').className=sw?'show':'';

    // Movement indicator arrows
    const mi=document.getElementById('move-indicator');
    const isMovingNow=(keys['KeyW']||keys['KeyS']||keys['KeyA']||keys['KeyD']||keys['ArrowUp']||keys['ArrowDown']||keys['ArrowLeft']||keys['ArrowRight']||joy.x||joy.y);
    if(mi){
      mi.style.opacity=isLocked?'1':'0';
      const hl='rgba(200,100,0,0.8)', lo='#333';
      document.getElementById('mi-n').style.color=(keys['KeyW']||keys['ArrowUp'])?hl:lo;
      document.getElementById('mi-s').style.color=(keys['KeyS']||keys['ArrowDown'])?hl:lo;
      document.getElementById('mi-l').style.color=(keys['KeyA']||keys['ArrowLeft'])?hl:lo;
      document.getElementById('mi-r').style.color=(keys['KeyD']||keys['ArrowRight'])?hl:lo;
    }
  }

  renderer.render(scene,camera);
}

// ══════════════════════════════════════════════════════════════════
//  RAYCAST
// ══════════════════════════════════════════════════════════════════
function getAimedSwitch(){
  RC.setFromCamera({x:0,y:0},camera);
  const hitboxes=switchGroups.map(s=>s.children.find(c=>c.name==='hit')).filter(Boolean);
  if(!hitboxes.length) return null;
  const hits=RC.intersectObjects(hitboxes,false);
  if(!hits.length) return null;
  const g=switchGroups.find(sg=>sg.children.includes(hits[0].object));
  return (g&&!g.userData.activated) ? g : null;
}

// ══════════════════════════════════════════════════════════════════
//  INPUT
// ══════════════════════════════════════════════════════════════════
function onMouseMove(e){
  if(!isLocked||!gameActive) return;
  yaw-=e.movementX*.0018; pitch-=e.movementY*.0018;
  pitch=Math.max(-Math.PI/2.1,Math.min(Math.PI/2.1,pitch));
  camera.rotation.y=yaw; camera.rotation.x=pitch;
}
function onClick(){
  if(!gameActive) return;
  if(!isLocked){ renderer.domElement.requestPointerLock(); return; }
  const sw=getAimedSwitch(); if(sw) activateSwitch(sw);
}

// ══════════════════════════════════════════════════════════════════
//  ACTIVATE SWITCH
// ══════════════════════════════════════════════════════════════════
function activateSwitch(sw){
  sw.userData.activated=true;
  // Cube turns dark red when used
  sw.userData.cube.material.color.setHex(0x440000);
  sw.userData.light.color.setHex(0xcc0000);
  sw.userData.light.intensity=0.4;

  foundInRound.add(sw.userData.id);
  document.getElementById('found-count').textContent=foundInRound.size;

  flashScreen(); playSound();

  // Pick a random item — avoid repeating within the round if possible
  let idx;
  const available=ITEMS.map((_,i)=>i).filter(i=>!usedItemsThisRound.includes(i));
  idx = available.length ? available[Math.floor(Math.random()*available.length)] : Math.floor(Math.random()*ITEMS.length);
  usedItemsThisRound.push(idx);

  setTimeout(()=>showReveal(idx), 280);
}

// ══════════════════════════════════════════════════════════════════
//  REVEAL ITEM
// ══════════════════════════════════════════════════════════════════
function showReveal(idx){
  if(isLocked) document.exitPointerLock();
  const item=ITEMS[idx];
  const c=document.getElementById('reveal-canvas');
  item.draw(c.getContext('2d'), c.width, c.height);
  document.getElementById('reveal-item-name').textContent=item.name;
  document.getElementById('reveal-model-hint').textContent='↗ 3D 模 型 ：'+item.modelName;
  document.getElementById('reveal-screen').classList.add('show');
  playSound();
}

function closeReveal(){
  document.getElementById('reveal-screen').classList.remove('show');

  // Check if all 3 switches found
  if(foundInRound.size>=3){
    startCountdown();
  } else {
    renderer.domElement.requestPointerLock();
  }
}

// ══════════════════════════════════════════════════════════════════
//  10-SECOND COUNTDOWN → LIGHTS OUT → NEW ROUND
// ══════════════════════════════════════════════════════════════════
function startCountdown(){
  let secs=10;
  document.getElementById('countdown-wrap').style.display='block';
  document.getElementById('countdown-num').textContent=secs;
  renderer.domElement.requestPointerLock();

  countdownTimer=setInterval(()=>{
    secs--;
    document.getElementById('countdown-num').textContent=secs;

    // Flicker ceiling light more intensely near end
    if(ceilingLight && secs<=3){
      ceilingLight.intensity=Math.random()<0.5?0:0.5;
    }

    if(secs<=0){
      clearInterval(countdownTimer);
      lightsOut();
    }
  },1000);
}

function lightsOut(){
  document.getElementById('countdown-wrap').style.display='none';
  if(isLocked) document.exitPointerLock();

  // Fade to black
  const blackout=document.getElementById('blackout');
  blackout.classList.add('fade');

  if(ceilingLight) ceilingLight.intensity=0;

  setTimeout(()=>{
    document.getElementById('new-round-msg').classList.add('show');
    setTimeout(()=>{
      document.getElementById('new-round-msg').classList.remove('show');
      newRound();
      blackout.classList.remove('fade');
    }, 2000);
  }, 900);
}

function newRound(){
  round++;
  document.getElementById('round-num').textContent=round;
  foundInRound.clear();
  usedItemsThisRound=[];
  document.getElementById('found-count').textContent='0';

  // Reset switches — new glowing cubes
  switchGroups.forEach((sw,i)=>{
    sw.userData.activated=false;
    sw.userData.cube.material.color.setHex(SWITCH_DEFS[i].color);
    sw.userData.light.color.setHex(SWITCH_DEFS[i].glowColor);
    sw.userData.light.intensity=1.2;
    sw.userData.cube.scale.setScalar(1);
  });

  // Restore ceiling light
  if(ceilingLight) ceilingLight.intensity=4.0;

  renderer.domElement.requestPointerLock();
}

// ══════════════════════════════════════════════════════════════════
//  SOUND
// ══════════════════════════════════════════════════════════════════
function playSound(){
  try{
    const ac=new(window.AudioContext||window.webkitAudioContext)();
    [[60,.06,'sawtooth',1.5,30],[900,.025,'sine',.25,200]].forEach(([f,g,tp,d,f2])=>{
      const o=ac.createOscillator(),gn=ac.createGain();
      o.type=tp;o.frequency.setValueAtTime(f,ac.currentTime);o.frequency.exponentialRampToValueAtTime(f2,ac.currentTime+d);
      gn.gain.setValueAtTime(g,ac.currentTime);gn.gain.exponentialRampToValueAtTime(.001,ac.currentTime+d);
      o.connect(gn);gn.connect(ac.destination);o.start();o.stop(ac.currentTime+d);
    });
  }catch(e){}
}
function flashScreen(){
  const f=document.getElementById('flash');
  f.style.transition='none';f.style.opacity='.35';
  requestAnimationFrame(()=>{f.style.transition='opacity .5s';f.style.opacity='0';});
}

// ══════════════════════════════════════════════════════════════════
//  VR
// ══════════════════════════════════════════════════════════════════
function checkVR(){
  const btn=document.getElementById('vr-btn');
  if(!navigator.xr){btn.textContent='瀏 覽 器 不 支 援 VR';return;}
  navigator.xr.isSessionSupported('immersive-vr').then(ok=>{
    if(ok){btn.textContent='進 入 VR 模 式';btn.classList.remove('dim');btn.onclick=async()=>{renderer.xr.enabled=true;renderer.xr.setSession(await navigator.xr.requestSession('immersive-vr'));};} 
    else btn.textContent='此 裝 置 不 支 援 VR';
  });
}

// ══════════════════════════════════════════════════════════════════
//  MOBILE
// ══════════════════════════════════════════════════════════════════
function setupTouch(){
  if(!('ontouchstart' in window)) return;
  document.getElementById('joy-zone').style.display='block';
  const base=document.getElementById('joy-base'),thumb=document.getElementById('joy-thumb');
  const R=45; let jc={x:0,y:0};
  base.addEventListener('touchstart',e=>{e.preventDefault();const tk=e.touches[0];jc={x:tk.clientX,y:tk.clientY};},{passive:false});
  base.addEventListener('touchmove',e=>{e.preventDefault();const tk=e.touches[0];let dx=tk.clientX-jc.x,dy=tk.clientY-jc.y;const l=Math.sqrt(dx*dx+dy*dy);if(l>R){dx=dx/l*R;dy=dy/l*R;}joy.x=dx/R;joy.y=dy/R;thumb.style.left=(45+dx)+'px';thumb.style.top=(45+dy)+'px';thumb.style.transform='none';},{passive:false});
  base.addEventListener('touchend',e=>{e.preventDefault();joy.x=0;joy.y=0;thumb.style.left='50%';thumb.style.top='50%';thumb.style.transform='translate(-50%,-50%)';},{passive:false});
  let lt=null,ll={x:0,y:0};
  renderer.domElement.addEventListener('touchstart',e=>{for(const tk of e.changedTouches)if(tk.clientX>innerWidth/2&&!lt){lt=tk.identifier;ll={x:tk.clientX,y:tk.clientY};}});
  renderer.domElement.addEventListener('touchmove',e=>{for(const tk of e.changedTouches)if(tk.identifier===lt){yaw-=(tk.clientX-ll.x)*.003;pitch-=(tk.clientY-ll.y)*.003;pitch=Math.max(-Math.PI/2.1,Math.min(Math.PI/2.1,pitch));camera.rotation.y=yaw;camera.rotation.x=pitch;ll={x:tk.clientX,y:tk.clientY};}});
  renderer.domElement.addEventListener('touchend',e=>{for(const tk of e.changedTouches){if(tk.identifier===lt)lt=null;if(gameActive&&tk.clientX>innerWidth/2){const sw=getAimedSwitch();if(sw)activateSwitch(sw);}}});
}

// ══════════════════════════════════════════════════════════════════
//  GAME FLOW
// ══════════════════════════════════════════════════════════════════
function startGame(){
  document.getElementById('start-screen').style.display='none';
  gameActive=true;
  renderer.domElement.requestPointerLock();
}

initThree();
</script>
