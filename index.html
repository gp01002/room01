<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>恐怖房間</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;font-family:'Courier New',monospace}
canvas{display:block}

/* ── 開始畫面 ── */
#start-screen{
  position:fixed;inset:0;background:#000;
  display:flex;align-items:center;justify-content:center;
  z-index:100;
}
.start-wrap{
  position:relative;
  width:min(88vw,480px);
}
.start-wrap > img{
  width:100%;height:auto;display:block;
}
.start-btns{
  position:absolute;
  bottom:8%;left:50%;transform:translateX(-50%);
  display:flex;gap:6%;width:72%;justify-content:center;align-items:center;
}
.sbtn{
  flex:0 0 46%;cursor:pointer;
  border:none;background:transparent;padding:0;
  transition:transform .18s,filter .18s;
}
.sbtn img{width:100%;height:auto;display:block;}
.sbtn:hover{transform:scale(1.1);filter:brightness(1.25);}
.btn{display:none}
#start-title{display:none}
#start-sub{display:none}
#hud{position:fixed;top:0;left:0;right:0;padding:14px 22px;background:linear-gradient(to bottom,rgba(0,0,0,.85),transparent);display:flex;justify-content:space-between;pointer-events:none;z-index:10;color:#440000;font-size:0.65rem;letter-spacing:4px}
#crosshair{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;z-index:20;width:20px;height:20px}
#ch-h,#ch-v{position:absolute;background:rgba(255,255,255,.38)}
#ch-h{width:14px;height:1px;top:9px;left:3px}
#ch-v{width:1px;height:14px;top:3px;left:9px}
#crosshair.aimed #ch-h,#crosshair.aimed #ch-v{background:rgba(255,100,0,.95)}
#aim-hint{position:fixed;top:57%;left:50%;transform:translateX(-50%);color:#bb3300;font-size:0.6rem;letter-spacing:5px;pointer-events:none;z-index:20;opacity:0;transition:opacity .15s}
#aim-hint.show{opacity:1}
#item-hint{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.88);border:1px solid #440000;color:#cc4400;font-size:0.78rem;letter-spacing:4px;text-align:center;padding:12px 28px;pointer-events:none;z-index:25;opacity:0;transition:opacity .3s;max-width:500px}
#item-hint.show{opacity:1}
#item-hint span{color:#333;font-size:0.5rem;display:block;margin-top:4px;letter-spacing:3px}
#flash{position:fixed;inset:0;background:#fff;opacity:0;pointer-events:none;z-index:40;transition:opacity .4s}
#diary-screen{position:fixed;inset:0;background:rgba(0,0,0,.95);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:55;cursor:pointer}
#diary-screen.show{display:flex}
#diary-img{max-width:88vw;max-height:80vh;border:1px solid #2a1400;box-shadow:0 0 50px rgba(60,20,0,.9)}
#diary-tap{margin-top:16px;color:#442200;font-size:0.58rem;letter-spacing:5px;animation:flick 2.5s infinite}
#loader{position:fixed;inset:0;background:#000;z-index:200;display:none;flex-direction:column;align-items:center;justify-content:center}
#loader-track{width:240px;height:2px;background:#111;margin:18px 0 10px}
#loader-fill{height:100%;width:0%;background:#550000;transition:width .2s}
#loader-msg{color:#222;font-size:0.58rem;letter-spacing:4px}
#loader-skip{margin-top:24px;padding:8px 28px;background:transparent;border:1px solid #181818;color:#181818;font-size:0.55rem;letter-spacing:4px;cursor:pointer;font-family:'Courier New',monospace;display:none}
#loader-skip:hover{border-color:#440000;color:#440000}
#hint-bar{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);color:#1a1a1a;font-size:0.5rem;letter-spacing:3px;pointer-events:none;z-index:10}
@keyframes flick{0%,100%{opacity:1}91%{opacity:1}92%{opacity:.2}93%{opacity:1}95%{opacity:.6}96%{opacity:1}}
</style>
</head>
<body>

<div id="loader">
  <div style="color:#330000;font-size:.65rem;letter-spacing:6px">載 入 中</div>
  <div id="loader-track"><div id="loader-fill"></div></div>
  <div id="loader-msg">準備中...</div>

<div id="start-screen">

    <img src="https://raw.githubusercontent.com/gp01002/room01/main/start_title.png"

<div id="hud">

</div>
<div id="crosshair"><div id="ch-h"></div><div id="ch-v"></div></div>

<div id="ending-screen" style="
  position:fixed;inset:0;background:#000;
  display:none;flex-direction:column;align-items:center;justify-content:center;
  z-index:70;cursor:pointer;gap:24px">
  <img id="ending-img" src="" style="max-width:85vw;max-height:65vh;display:none">
  <div id="ending-text" style="
    color:#550000;font-size:1.1rem;letter-spacing:8px;text-align:center;

    animation:flick 4s infinite;max-width:600px;padding:0 20px">

<!-- 手機虛擬搖桿 -->
<div id="joy-zone" style="position:fixed;bottom:40px;left:30px;z-index:30;display:none;touch-action:none">

    <div id="joy-thumb" style="width:36px;height:36px;border-radius:50%;background:rgba(100,0,0,.5);border:1px solid #550000;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none"></div>
  </div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script>
'use strict';
// ══════════════════════════════════════════════════════════════════
//  CONFIG — 房間 GLB 精確座標（room.glb 分析結果）
//  地板 Y=-2.30  天花板 Y=+2.46  眼睛 Y=0
//  牆面：北 Z=-3.09  東 X=2.73  西 X=-5.54  南 Z=4.86
// ══════════════════════════════════════════════════════════════════
const BASE = 'https://raw.githubusercontent.com/gp01002/room01/main/';

const ITEMS = [
  { name:'古 老 電 話',   model:'Old Rotary Telephone', glb:'old_telephone.glb' },
  { name:'破 碎 的 娃 娃', model:'Broken Porcelain Doll', glb:'broken_doll.glb' },
  { name:'音 樂 盒',      model:'Antique Music Box',     glb:'music%20box%20antique.glb' },
  { name:'染 血 的 鑰 匙', model:'Blood-Stained Key',     glb:null },
  { name:'碎 裂 的 鏡 子', model:'Cracked Mirror',        glb:'broken%20mirror.glb' },
  { name:'罐 中 的 眼 睛', model:'Eye in Jar',            glb:'eye%20jar.glb' },
  { name:'融 化 的 蠟 燭', model:'Melting Candle',        glb:'melting%20candle.glb' },
  { name:'撕 破 的 日 記', model:'Old Book Diary',        glb:'old%20book%20diary.glb' },
  { name:'停 止 的 時 鐘', model:'Grandfather Clock',     glb:'grandfather%20clock.glb' },
  { name:'無 名 的 骨 頭', model:'Human Skull',           glb:'human%20skull.glb' },
];

// 開關貼牆位置（已精確對齊牆面 + 0.12 偏移）
const SW_DEFS = [
  { p:[ 0.5, -0.5,-3.09], ry:  0, l:'北牆中央' },
  { p:[-3.5, -0.5,-3.09], ry:  0, l:'北牆西側' },
  { p:[ 2.61,-0.5, -2.0], ry:-90, l:'東牆北段' },
  { p:[ 2.61,-0.5,  2.0], ry:-90, l:'東牆南段' },
  { p:[-5.42,-0.5,  0.0], ry: 90, l:'西牆中央' },
  { p:[-5.42,-0.5,  3.0], ry: 90, l:'西牆南段' },
  { p:[-1.5, -0.5, 4.74], ry:180, l:'南牆西側' },
];
const SW_COLORS = [0x00aaff,0xff4400,0x00ff88,0xff00cc,0xffcc00];

// 物品出現位置（依家具分布）
const ITEM_POS = [
  [ 0.0,-2.30, 0.5,'房間中央'],
  [ 4.8,-0.85, 0.5,'書桌上'],
  [ 1.5,-2.30,-4.5,'床邊'],
  [-1.5,-2.30,-2.5,'衣櫃旁'],
  [-4.5,-2.30,-3.5,'西北角'],
  [-2.0,-2.30, 3.8,'南牆前'],
  [ 3.5,-2.30, 3.5,'東南角'],
  [ 0.0,-2.30,-2.5,'北牆前'],
];

const DIARY_BASE = BASE;
const DIARY_IMGS = ['diary_01.png','diary_02.png','diary_03.png','diary_04.png',
                    'diary_05.png','diary_06.png','diary_07.png','diary_08.png',
                    'diary_09.png','diary_10.png'];

// ── state ─────────────────────────────────────────────────────────
let scene, camera, renderer, clock;
let ceilingLight, ambientLight, fill1, fill2;
let yaw=0, pitch=0, isLocked=false, gameActive=false;
let switchGroup=null, currentItem=null;
let sceneBright=false, lightTimer=null;
let usedItemIdxs=[], lastSwIdx=-1;
let powerCache=null, skipRequested=false, t=0;
let xrSession=null, vrGazeTimer=0, vrReticle=null, cameraRig=null;
let floatingNote=null, noteClickCount=0, noteTimer=null;
let totalItemsFound=0;  // 累計找到的物品數（不重置）
const joy={x:0,y:0};
const RC = new THREE.Raycaster(); RC.far=10;
const keys={};
document.addEventListener('keydown',e=>keys[e.code]=true);
document.addEventListener('keyup',  e=>keys[e.code]=false);

// ══════════════════════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════════════════════
function initThree(){
  scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x050302, 0.03);

  camera = new THREE.PerspectiveCamera(72, innerWidth/innerHeight, 0.05, 60);
  camera.rotation.order = 'YXZ';

  // VR 用：cameraRig 控制玩家位置，camera 掛在其下
  cameraRig = new THREE.Group();
  cameraRig.position.set(0, 0, 2);
  cameraRig.add(camera);

  renderer = new THREE.WebGLRenderer({antialias:true});
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  renderer.setSize(innerWidth, innerHeight);
  renderer.shadowMap.enabled = true;
  renderer.xr.enabled = true;
  document.body.insertBefore(renderer.domElement, document.body.firstChild);

  clock = new THREE.Clock();
  scene.add(cameraRig);

  window.addEventListener('resize',()=>{
    camera.aspect=innerWidth/innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth,innerHeight);
  });
  document.addEventListener('mousemove', onMouseMove);
  document.addEventListener('click', onClick);
  document.addEventListener('pointerlockchange',()=>{
    isLocked = document.pointerLockElement===renderer.domElement;
  });
  document.getElementById('diary-screen').addEventListener('click', closeDiary);

  buildLights();
  setupTouch();
  loadAll();
}

// ══════════════════════════════════════════════════════════════════
//  LIGHTS
// ══════════════════════════════════════════════════════════════════
function buildLights(){
  ambientLight = new THREE.AmbientLight(0x120e06, 0.25);
  scene.add(ambientLight);

  ceilingLight = new THREE.PointLight(0xcc6628, 0.55, 16, 1.8);
  ceilingLight.position.set(0, 2.0, 0);
  scene.add(ceilingLight);

  fill1 = new THREE.PointLight(0x3a2010, 0.15, 12, 2);
  fill1.position.set(-4, 1.5, -4);
  scene.add(fill1);

  fill2 = new THREE.PointLight(0x3a2010, 0.15, 12, 2);
  fill2.position.set(4, 1.5, 3);
  scene.add(fill2);

  // VR 準星
  const mat = new THREE.MeshBasicMaterial({color:0xffffff,transparent:true,opacity:.8});
  vrReticle = new THREE.Group();
  vrReticle.add(new THREE.Mesh(new THREE.BoxGeometry(.022,.002,.002),mat));
  vrReticle.add(new THREE.Mesh(new THREE.BoxGeometry(.002,.022,.002),mat));
  scene.add(vrReticle);
}

function setLights(bright){
  sceneBright = bright;
  if(bright){
    ambientLight.intensity = 1.8;
    ceilingLight.intensity = 2.8; ceilingLight.color.setHex(0xfff0d0);
    fill1.intensity = 1.4; fill1.color.setHex(0xffd890);
    fill2.intensity = 1.4; fill2.color.setHex(0xffd890);
  } else {
    ambientLight.intensity = 0.25;
    ceilingLight.intensity = 0.55; ceilingLight.color.setHex(0xcc6628);
    fill1.intensity = 0.15; fill1.color.setHex(0x3a2010);
    fill2.intensity = 0.15; fill2.color.setHex(0x3a2010);
  }
}

// ══════════════════════════════════════════════════════════════════
//  LOAD ASSETS
// ══════════════════════════════════════════════════════════════════
let skipRequested2=false;
function skipLoad(){ skipRequested=true; }

function loadAll(){
  document.getElementById('loader').style.display='flex';
  setTimeout(()=>document.getElementById('loader-skip').style.display='block', 3000);

  loadGLB(BASE+'room.glb','room.glb')
  .then(g=>{ if(g) placeRoom(g); else buildFallbackRoom(); })
  .then(()=>loadGLB(BASE+'dirty_light_switch.glb','switch.glb'))
  .then(g=>{ powerCache=g; })
  .then(()=>{
    document.getElementById('loader').style.display='none';
    spawnSwitch();
    checkVR();
    renderer.setAnimationLoop(render);
  });
}

function loadGLB(url, label){
  return new Promise(resolve=>{
    if(typeof THREE.GLTFLoader==='undefined'){ resolve(null); return; }
    setLoaderMsg(label+' 載入中...');
    let done=false, lastProg=Date.now();
    const hard=setTimeout(()=>fin(null),9000);
    const noResp=setTimeout(()=>{ if(Date.now()-lastProg>3000)fin(null); },3000);
    const poll=setInterval(()=>{ if(skipRequested)fin(null); },300);
    function fin(g){
      if(done)return; done=true;
      clearTimeout(hard);clearTimeout(noResp);clearInterval(poll);
      setLoaderPct(100); resolve(g);
    }
    new THREE.GLTFLoader().load(url,
      g=>fin(g),
      p=>{ lastProg=Date.now(); if(p.total>0) setLoaderPct(Math.round(p.loaded/p.total*100),label); },
      ()=>fin(null)
    );
  });
}

function setLoaderMsg(m){ document.getElementById('loader-msg').textContent=m; }
function setLoaderPct(p,l){
  document.getElementById('loader-fill').style.width=p+'%';
  if(l) document.getElementById('loader-msg').textContent=l+' '+p+'%';
}

// ══════════════════════════════════════════════════════════════════
//  ROOM
// ══════════════════════════════════════════════════════════════════
function placeRoom(gltf){
  const m = gltf.scene;
  const box = new THREE.Box3().setFromObject(m);
  const size = box.getSize(new THREE.Vector3());
  const sc = 14 / Math.max(size.x, size.y, size.z);
  m.scale.setScalar(sc);
  box.setFromObject(m);
  const center = box.getCenter(new THREE.Vector3());
  m.position.set(-center.x, -box.min.y - 2.5, -center.z);
  m.traverse(ch=>{
    if(ch.isMesh){
      ch.receiveShadow = true;
      const ms = Array.isArray(ch.material)?ch.material:[ch.material];
      ms.forEach(mat=>{ if(mat.color) mat.color.multiplyScalar(0.75); });
    }
  });
  scene.add(m);
}

function buildFallbackRoom(){
  // 簡易程序房間作 fallback
  const wm = new THREE.MeshLambertMaterial({color:0x2a2218,side:THREE.BackSide});
  const fm = new THREE.MeshLambertMaterial({color:0x1a140c});
  const cm = new THREE.MeshLambertMaterial({color:0x080808,side:THREE.BackSide});
  const box = new THREE.Mesh(new THREE.BoxGeometry(12,5.2,14),[wm,wm,cm,fm,wm,wm]);
  scene.add(box);
}

// ══════════════════════════════════════════════════════════════════
//  SWITCH（開關）
// ══════════════════════════════════════════════════════════════════
function spawnSwitch(){
  if(switchGroup){ scene.remove(switchGroup); switchGroup=null; }

  // 隨機選不重複的牆位
  let idx;
  do { idx=Math.floor(Math.random()*SW_DEFS.length); }
  while(idx===lastSwIdx && SW_DEFS.length>1);
  lastSwIdx=idx;
  const def=SW_DEFS[idx];
  const color=SW_COLORS[Math.floor(Math.random()*SW_COLORS.length)];

  const g = new THREE.Group();

  if(powerCache){
    const model = powerCache.scene.clone(true);

    // 強制重設所有內部節點的 rotation 為 identity
    // 這樣 GLB 內建的 baked transform 就不會干擾外層旋轉
    model.traverse(node=>{
      if(node.isMesh || node.isGroup || node.isObject3D){
        node.rotation.set(0, 0, 0);
        node.quaternion.set(0, 0, 0, 1);
      }
    });

    // 縮放：面板約 4cm
    const sc = 0.12 / 52;
    model.scale.setScalar(sc);

    // 原始頂點: X[-21.8,30.2] Y[-16.6,0.1] Z[0.7,52.7]
    // 目標：面板(Y≈0)朝玩家(+Z)，高度(Z軸)直立(Y軸)
    // rotation.x = -PI/2: Y→-Z(背面貼牆), Z→+Y(直立) ← 但面板Y=0→-Z朝牆
    // rotation.x = +PI/2: Y→+Z(面板朝玩家✓), Z→-Y(倒立)
    // 所以用 +PI/2 + 再加 rotation.z=PI 翻轉直立方向
    const wrapper = new THREE.Group();

    // 步驟1: +PI/2 讓面板朝玩家
    // 步驟2: rotation.z = PI 讓高度翻正（原本倒立）
    wrapper.rotation.x = Math.PI / 2;
    wrapper.rotation.z = Math.PI;

    // 重設後的頂點中心偏移 (旋轉後計算):
    // rotation.x=+PI/2: X不變, Y→Z, Z→-Y
    // X center = 4.2*sc = 0.0097
    // Z_new = Y_old center = -8.3*sc = -0.0192  → 最小Z=Y_old_min=-16.6*sc=-0.038
    // Y_new = -Z_old center = -26.7*sc = -0.0616  → 最小Y=-Z_old_max=-52.7*sc=-0.122
    // 加 rotation.z=PI: X→-X, Y→-Y
    // 最終: pos.x = +0.0097, pos.y = +0.0616
    //       pos.z = +0.038 讓背面(Z_new_min=-0.038)貼牆面(z=0)
    model.position.set(0.010, 0.062, 0.038);
    wrapper.add(model);

    model.traverse(ch=>{
      if(!ch.isMesh) return;
      const ms=Array.isArray(ch.material)?ch.material:[ch.material];
      ms.forEach(mat=>{
        mat=mat.clone();
        mat.side=THREE.DoubleSide;
        mat.emissive=new THREE.Color(color);
        mat.emissiveIntensity=0.7;
        ch.material=mat;
      });
    });

    g.add(wrapper);
  } else {
    // Fallback: 扁平面板
    const plate = new THREE.Mesh(
      new THREE.BoxGeometry(0.14,0.10,0.015),
      new THREE.MeshBasicMaterial({color:0xdddddd})
    );
    plate.position.z=0.008;
    g.add(plate);
    const btn = new THREE.Mesh(
      new THREE.BoxGeometry(0.06,0.08,0.022),
      new THREE.MeshBasicMaterial({color})
    );
    btn.position.z=0.019;
    g.add(btn);
  }

  // 微弱點光源
  const light = new THREE.PointLight(color, 0.6, 1.8, 2);
  light.position.set(0, 0, 0.1);
  g.add(light);

  // 隱形 hitbox（足夠大可點擊）
  const hb = new THREE.Mesh(
    new THREE.BoxGeometry(0.55, 0.55, 0.35),
    new THREE.MeshBasicMaterial({visible:false})
  );
  hb.name='hit'; g.add(hb);

  // 貼牆放置
  g.position.set(...def.p);
  g.rotation.y = def.ry * Math.PI/180;
  g.userData = { activated:false, light, label:def.l };
  light.intensity = 0.6;

  scene.add(g);
  switchGroup = g;
  console.log('Switch:', def.l);
}

function getAimedSwitch(){
  if(!switchGroup||switchGroup.userData.activated) return null;
  // VR 模式用 XRCamera，桌機用一般 camera
  const cam = (xrSession && renderer.xr) ? renderer.xr.getCamera(camera) : camera;
  RC.setFromCamera({x:0,y:0}, cam);
  const hb = switchGroup.children.find(c=>c.name==='hit');
  if(!hb) return null;
  return RC.intersectObjects([hb],false).length ? switchGroup : null;
}

// ══════════════════════════════════════════════════════════════════
//  ITEM（物品）
// ══════════════════════════════════════════════════════════════════
function spawnItem(itemIdx){
  removeItem();
  const [x,y,z,label] = ITEM_POS[Math.floor(Math.random()*ITEM_POS.length)];
  const item = ITEMS[itemIdx];
  const g = new THREE.Group();
  g.position.set(x,y,z);

  // 小發光底環
  const ring = new THREE.Mesh(
    new THREE.TorusGeometry(0.18,0.022,8,24),
    new THREE.MeshBasicMaterial({color:0x440000,transparent:true,opacity:0.7})
  );
  ring.rotation.x=Math.PI/2; ring.position.y=0.01; g.add(ring);

  // 近距離偵測碰撞體
  const prox = new THREE.Mesh(
    new THREE.BoxGeometry(2.5,2.5,2.5),
    new THREE.MeshBasicMaterial({visible:false})
  );
  prox.name='itemProx';
  prox.userData={name:item.name, model:item.model};
  g.add(prox);

  // 微弱點光
  const glow = new THREE.PointLight(0x440000, 0.7, 2.5, 1.8);
  glow.position.y=0.4; g.add(glow);

  scene.add(g);
  currentItem=g;

  if(item.glb && typeof THREE.GLTFLoader!=='undefined'){
    new THREE.GLTFLoader().load(BASE+item.glb,
      gltf=>{
        const model=gltf.scene;
        const bbox=new THREE.Box3().setFromObject(model);
        const size=bbox.getSize(new THREE.Vector3());
        const sc=0.75/Math.max(size.x,size.y,size.z);
        model.scale.setScalar(sc);
        bbox.setFromObject(model);
        // 底部貼地
        model.position.set(
          -(bbox.min.x+bbox.max.x)/2,
          -bbox.min.y,
          -(bbox.min.z+bbox.max.z)/2
        );
        model.traverse(ch=>{
          if(ch.isMesh){ ch.castShadow=true; }
        });
        g.add(model);
      },
      null,
      ()=>addCanvasPlane(g,item)
    );
  } else {
    addCanvasPlane(g,item);
  }
}

function addCanvasPlane(g, item){
  // 顯示物品名稱的簡單面板
  const cv=document.createElement('canvas'); cv.width=256; cv.height=128;
  const ctx=cv.getContext('2d');
  ctx.fillStyle='#110000'; ctx.fillRect(0,0,256,128);
  ctx.strokeStyle='#440000'; ctx.lineWidth=2; ctx.strokeRect(4,4,248,120);
  ctx.fillStyle='#883300'; ctx.font='bold 22px Courier New'; ctx.textAlign='center';
  ctx.fillText(item.name, 128, 50);
  ctx.fillStyle='#332200'; ctx.font='14px Courier New';
  ctx.fillText(item.model, 128, 90);
  const plane=new THREE.Mesh(
    new THREE.PlaneGeometry(0.9,0.45),
    new THREE.MeshBasicMaterial({map:new THREE.CanvasTexture(cv),side:THREE.DoubleSide})
  );
  plane.position.y=0.5; plane.userData.billboard=true;
  g.add(plane);
}

function removeItem(){
  if(currentItem){ scene.remove(currentItem); currentItem=null; }
  const h=document.getElementById('item-hint');
  if(h) h.classList.remove('show');
}

// ══════════════════════════════════════════════════════════════════
//  ACTIVATE
// ══════════════════════════════════════════════════════════════════
function activateSwitch(){
  if(!switchGroup||switchGroup.userData.activated) return;
  switchGroup.userData.activated=true;

  // 暗紅殘影
  if(switchGroup.userData.light){
    switchGroup.userData.light.color.setHex(0x330000);
    switchGroup.userData.light.intensity=0.1;
  }
  switchGroup.traverse(ch=>{
    if(ch.isMesh){
      const ms=Array.isArray(ch.material)?ch.material:[ch.material];
      ms.forEach(m=>{ if(m.emissive){m.emissive.setHex(0x1a0000);m.emissiveIntensity=0.15;} });
    }
  });

  // 閃光
  const f=document.getElementById('flash');
  f.style.transition='none'; f.style.opacity='0.5';
  setTimeout(()=>{f.style.transition='opacity .5s'; f.style.opacity='0';},80);
  playSound();

  // 選物品
  const avail=ITEMS.map((_,i)=>i).filter(i=>!usedItemIdxs.includes(i));
  const idx=avail.length ? avail[Math.floor(Math.random()*avail.length)] : Math.floor(Math.random()*ITEMS.length);
  usedItemIdxs.push(idx);
  totalItemsFound++;
  if(usedItemIdxs.length>=ITEMS.length) usedItemIdxs=[];

  // 燈亮 + 物品出現
  setLights(true);
  spawnItem(idx);

  // 5秒後：關燈 → 移除物品 → 顯示日記
  if(lightTimer) clearTimeout(lightTimer);
  lightTimer=setTimeout(()=>{
    setLights(false);
    removeItem();
    setTimeout(()=>showDiary(idx), 500);
  }, 5000);
}

// ══════════════════════════════════════════════════════════════════
//  DIARY
// ══════════════════════════════════════════════════════════════════
function showDiary(idx){
  if(isLocked) document.exitPointerLock();
  removeFloatingNote();
  const imgName = DIARY_IMGS[idx % DIARY_IMGS.length];
  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = () => buildFloatingNote(img);
  img.onerror = () => buildFloatingNote(null, ITEMS[idx]);
  img.src = DIARY_BASE + imgName;
}

function buildFloatingNote(img, fallbackItem){
  const cv = document.createElement('canvas');
  cv.width = 512; cv.height = 512;
  const ctx = cv.getContext('2d');

  if(img){
    ctx.clearRect(0,0,512,512);
    ctx.drawImage(img, 0, 0, 512, 512);
  } else {
    ctx.fillStyle = '#f0ead8';
    ctx.fillRect(0, 0, 512, 512);
    ctx.fillStyle = '#1a0a00';
    ctx.font = 'bold 40px serif';
    ctx.textAlign = 'center';
    ctx.fillText(fallbackItem ? fallbackItem.name : '???', 256, 256);
  }

  const grp = new THREE.Group();
  const plane = new THREE.Mesh(
    new THREE.PlaneGeometry(0.52, 0.52),
    new THREE.MeshBasicMaterial({
      map: new THREE.CanvasTexture(cv),
      side: THREE.DoubleSide,
      transparent: true,
      alphaTest: 0.04
    })
  );
  grp.add(plane);

  // 放在玩家正前方 0.65m
  const camPos = cameraRig ? cameraRig.position.clone() : camera.position.clone();
  camPos.y = (cameraRig ? cameraRig.position.y : 0) + 0.1;
  const fwd = new THREE.Vector3(-Math.sin(yaw), 0, -Math.cos(yaw));
  grp.position.copy(camPos).addScaledVector(fwd, 0.65);

  grp.userData = {
    rotSpd: 0.35 + Math.random() * 0.25,
    floatPh: Math.random() * Math.PI * 2,
    startMs: performance.now()
  };

  scene.add(grp);
  floatingNote = grp;
  noteClickCount = 0;

  document.getElementById('hud-right').innerHTML =
    '<span style="color:#332200;font-size:.5rem">點 擊 10 下 或 等 15 秒 繼 續</span>';

  if(noteTimer) clearTimeout(noteTimer);
  // 第10個物品後顯示結局
  const isEnding = (totalItemsFound >= ITEMS.length);
  noteTimer = setTimeout(() => isEnding ? showEnding() : closeDiary(), 15000);

  const isEndingNote = (totalItemsFound >= ITEMS.length);
  function onAnyClick(){ noteClickCount++; if(floatingNote) floatingNote.userData.rotSpd *= -1.4; if(noteClickCount >= 10){ if(isEndingNote) showEnding(); else closeDiary(); } }
  document._noteClick = onAnyClick;
  document.addEventListener('click', onAnyClick);
  document.addEventListener('touchend', onAnyClick);
}

function updateFloatingNote(dt){
  if(!floatingNote) return;
  const age = (performance.now() - floatingNote.userData.startMs) / 1000;
  const fp  = floatingNote.userData.floatPh;

  // 緩慢旋轉 Y（像撿到的紙）
  floatingNote.rotation.y += floatingNote.userData.rotSpd * dt;
  // 上下漂浮
  floatingNote.position.y += Math.sin(age * 1.3 + fp) * 0.0009;
  // 輕微搖晃
  floatingNote.rotation.z = Math.sin(age * 0.8 + fp) * 0.045;

  // 最後3秒淡出
  const remaining = 15 - age;
  if(remaining < 3 && floatingNote.children[0]){
    floatingNote.children[0].material.opacity = Math.max(0, remaining / 3);
  }
}

function removeFloatingNote(){
  if(floatingNote){ scene.remove(floatingNote); floatingNote = null; }
  if(noteTimer){ clearTimeout(noteTimer); noteTimer = null; }
  if(document._noteClick){
    document.removeEventListener('click', document._noteClick);
    document.removeEventListener('touchend', document._noteClick);
    document._noteClick = null;
  }
  document.getElementById('hud-right').innerHTML = '';
}

function showEnding(){
  removeFloatingNote();
  if(isLocked) document.exitPointerLock();
  const el=document.getElementById('ending-screen');
  el.style.display='flex';
  // 嘗試載入結局 PNG，不存在就顯示文字
  const img=document.getElementById('ending-img');
  img.src='https://raw.githubusercontent.com/gp01002/room01/main/ending.png';
  img.onload=()=>{ img.style.display='block'; document.getElementById('ending-text').style.display='none'; };
  img.onerror=()=>{ img.style.display='none'; document.getElementById('ending-text').style.display='block'; };
  el.onclick=()=>restartGame();
}

function restartGame(){
  document.getElementById('ending-screen').style.display='none';
  totalItemsFound=0; usedItemIdxs=[];
  // 重回開始畫面
  document.getElementById('start-screen').style.display='flex';
  gameActive=false;
  if(isLocked) document.exitPointerLock();
}

function closeDiary(){
  document.getElementById('diary-screen').classList.remove('show');
  removeFloatingNote();
  setTimeout(() => spawnSwitch(), 500);
  if(!xrSession) renderer.domElement.requestPointerLock();
}

//  VR — Meta Quest

async function checkVR(){
  const vrBtn=document.getElementById('vr-img-btn');
  if(!navigator.xr){ return; }
  try{
    const ok=await navigator.xr.isSessionSupported('immersive-vr');
    if(ok && vrBtn){
      vrBtn.style.opacity='1';
      vrBtn.title='進入 VR（Meta Quest）';
    }
  }catch(e){}
}

function enterVRFromBtn(){
  // 如果 VR 可用就進 VR，否則一般進入
  if(navigator.xr){
    navigator.xr.isSessionSupported('immersive-vr').then(ok=>{
      if(ok) enterVR(); else startGame();
    }).catch(()=>startGame());
  } else {
    startGame();
  }
}

async function enterVR(){
  try{
    const session=await navigator.xr.requestSession('immersive-vr',{
      requiredFeatures:['local-floor'],
      optionalFeatures:['bounded-floor','hand-tracking']
    });
    xrSession=session;
    renderer.xr.setSession(session);
    // 調整 VR 高度：下移 cameraRig 讓玩家站在地板上
    cameraRig.position.y=-1.2;
    session.addEventListener('end',()=>{
      xrSession=null;
      cameraRig.position.y=0;
    });
    document.getElementById('start-screen').style.display='none';
    gameActive=true;
  }catch(e){ console.error('VR error',e); }
}

function onMouseMove(e){
  if(!isLocked||!gameActive) return;
  yaw -= e.movementX*.0018;
  pitch -= e.movementY*.0018;
  pitch=Math.max(-Math.PI/2.1, Math.min(Math.PI/2.1, pitch));
  camera.rotation.y=yaw; camera.rotation.x=pitch;
}

function onClick(){
  if(!gameActive) return;
  if(!isLocked){ renderer.domElement.requestPointerLock(); return; }
  if(document.getElementById('diary-screen').classList.contains('show')){ closeDiary(); return; }
  const sw=getAimedSwitch(); if(sw) activateSwitch();
}

// ══════════════════════════════════════════════════════════════════
//  RENDER
// ══════════════════════════════════════════════════════════════════
function render(){
  try{
  const dt=clock.getDelta(); t+=dt;

  // 天花板微閃（暗場）
  if(!sceneBright && ceilingLight)
    ceilingLight.intensity=0.50+Math.sin(t*1.1)*.07+Math.sin(t*4.3)*.03;

  // 桌機移動（移動 cameraRig）
  if(gameActive && isLocked && !xrSession){
    const spd=3*dt;
    const fwd=new THREE.Vector3(-Math.sin(yaw),0,-Math.cos(yaw));
    const right=new THREE.Vector3(Math.cos(yaw),0,-Math.sin(yaw));
    if(keys['KeyW']||keys['ArrowUp'])    cameraRig.position.addScaledVector(fwd,spd);
    if(keys['KeyS']||keys['ArrowDown'])  cameraRig.position.addScaledVector(fwd,-spd);
    if(keys['KeyA']||keys['ArrowLeft'])  cameraRig.position.addScaledVector(right,-spd);
    if(keys['KeyD']||keys['ArrowRight']) cameraRig.position.addScaledVector(right,spd);
    const moving=keys['KeyW']||keys['KeyS']||keys['KeyA']||keys['KeyD'];
    cameraRig.position.y = moving ? Math.sin(t*7)*0.035 : 0;
  }

  // 手機搖桿移動
  if(gameActive && (joy.x||joy.y)){
    const spd=3*dt;
    const fwd=new THREE.Vector3(-Math.sin(yaw),0,-Math.cos(yaw));
    const right=new THREE.Vector3(Math.cos(yaw),0,-Math.sin(yaw));
    cameraRig.position.addScaledVector(fwd,-joy.y*spd);
    cameraRig.position.addScaledVector(right,joy.x*spd);
  }

  // 移動邊界
  cameraRig.position.x=Math.max(-5.2, Math.min(2.5, cameraRig.position.x));
  cameraRig.position.z=Math.max(-2.8, Math.min(4.5, cameraRig.position.z));

  // VR 搖桿移動 + 準星互動
  if(gameActive && xrSession){
    const session=renderer.xr.getSession();
    if(session){
      for(const src of session.inputSources){
        if(!src.gamepad) continue;
        // 左手：搖桿移動
        if(src.handedness==='left'){
          const ax=src.gamepad.axes, spd=2.5*dt;
          if(Math.abs(ax[2])>.15||Math.abs(ax[3])>.15){
            // VR: 取 XRCamera 朝向，移動 cameraRig
            const xrcam=renderer.xr.getCamera(camera);
            const dir=new THREE.Vector3();
            xrcam.getWorldDirection(dir); dir.y=0; dir.normalize();
            const rt=new THREE.Vector3().crossVectors(dir,new THREE.Vector3(0,1,0));
            cameraRig.position.addScaledVector(dir,-ax[3]*spd);
            cameraRig.position.addScaledVector(rt, ax[2]*spd);
            // 邊界限制
            cameraRig.position.x=Math.max(-5.2,Math.min(2.5,cameraRig.position.x));
            cameraRig.position.z=Math.max(-2.8,Math.min(4.5,cameraRig.position.z));
          }
        }
        // 右手：Trigger(0) 或 A鍵(4) 啟動開關
        if(src.handedness==='right'){
          const btn0=src.gamepad.buttons[0];
          const btn4=src.gamepad.buttons[4];
          const pressed=(btn0&&btn0.pressed)||(btn4&&btn4.pressed);
          if(pressed && !src.gamepad._wasPressed){
            const sw=getAimedSwitch(); if(sw) activateSwitch();
          }
          src.gamepad._wasPressed=pressed;
        }
      }
    }
    // 凝視計時（準星對準 1.5 秒自動觸發）
    const sw=getAimedSwitch();
    if(sw){ vrGazeTimer+=dt; if(vrGazeTimer>=1.5){vrGazeTimer=0;activateSwitch();} }
    else vrGazeTimer=0;
    // 更新 VR 準星
    if(vrReticle){
      const xrcam=renderer.xr.getCamera(camera);
      const dir=new THREE.Vector3(); xrcam.getWorldDirection(dir);
      vrReticle.position.copy(xrcam.position).addScaledVector(dir,1.8);
      vrReticle.lookAt(xrcam.position);
      const p=vrGazeTimer/1.5;
      vrReticle.children.forEach(m=>m.material.color.setRGB(1,1-p*.85,1-p*.85));
    }
  }

  // 開關脈衝光
  if(switchGroup && !switchGroup.userData.activated && switchGroup.userData.light)
    switchGroup.userData.light.intensity=0.5+Math.sin(t*2.2)*.25;

  // Billboard
  if(currentItem){
    currentItem.children.forEach(ch=>{
      if(ch.userData && ch.userData.billboard) ch.lookAt(camera.position);
    });
  }

  // 靠近物品提示
  if(sceneBright && currentItem){
    const d=camera.position.distanceTo(currentItem.position);
    const hintEl=document.getElementById('item-hint');
    const prox=currentItem.children.find(c=>c.name==='itemProx');
    if(d<2.5 && prox){
      hintEl.innerHTML='<b>'+prox.userData.name+'</b><span>'+prox.userData.model+'</span>';
      hintEl.classList.add('show');
    } else {
      hintEl.classList.remove('show');
    }
  } else {
    document.getElementById('item-hint').classList.remove('show');
  }

  // 浮動紙片
  updateFloatingNote(dt);

  // 準星
  if(gameActive){
    const aimed=!!getAimedSwitch();
    document.getElementById('crosshair').className=aimed?'aimed':'';
    document.getElementById('aim-hint').className=aimed?'show':'';
  }

  renderer.render(scene, camera);
  }catch(err){ console.error('render:',err); }
}

// ══════════════════════════════════════════════════════════════════
//  MOBILE TOUCH
// ══════════════════════════════════════════════════════════════════
function setupTouch(){
  if(!('ontouchstart' in window)) return;
  // 顯示搖桿和點擊區
  document.getElementById('joy-zone').style.display='block';
  document.getElementById('tap-zone').style.display='block';

  const base=document.getElementById('joy-base');
  const thumb=document.getElementById('joy-thumb');
  const R=27; // 搖桿最大位移半徑
  let jCenter={x:0,y:0};

  base.addEventListener('touchstart',e=>{
    e.preventDefault();
    const t=e.touches[0];
    jCenter={x:t.clientX,y:t.clientY};
  },{passive:false});

  base.addEventListener('touchmove',e=>{
    e.preventDefault();
    const t=e.touches[0];
    let dx=t.clientX-jCenter.x, dy=t.clientY-jCenter.y;
    const len=Math.sqrt(dx*dx+dy*dy);
    if(len>R){dx=dx/len*R;dy=dy/len*R;}
    joy.x=dx/R; joy.y=dy/R;
    thumb.style.left=(45+dx)+'px';
    thumb.style.top=(45+dy)+'px';
    thumb.style.transform='none';
  },{passive:false});

  base.addEventListener('touchend',e=>{
    e.preventDefault();
    joy.x=0; joy.y=0;
    thumb.style.left='50%'; thumb.style.top='50%';
    thumb.style.transform='translate(-50%,-50%)';
  },{passive:false});

  // 右側滑動轉視角 + 點擊啟動開關
  const tapZone=document.getElementById('tap-zone');
  let lookStart={x:0,y:0}, lookId=null;

  tapZone.addEventListener('touchstart',e=>{
    for(const t of e.changedTouches){
      if(lookId===null){ lookId=t.identifier; lookStart={x:t.clientX,y:t.clientY}; }
    }
  });
  tapZone.addEventListener('touchmove',e=>{
    e.preventDefault();
    for(const t of e.changedTouches){
      if(t.identifier===lookId){
        yaw  -=(t.clientX-lookStart.x)*.003;
        pitch-=(t.clientY-lookStart.y)*.003;
        pitch=Math.max(-Math.PI/2.1,Math.min(Math.PI/2.1,pitch));
        camera.rotation.y=yaw; camera.rotation.x=pitch;
        lookStart={x:t.clientX,y:t.clientY};
      }
    }
  },{passive:false});
  tapZone.addEventListener('touchend',e=>{
    for(const t of e.changedTouches){
      if(t.identifier===lookId){
        lookId=null;
        // 短點擊 → 嘗試啟動開關
        if(gameActive){ const sw=getAimedSwitch(); if(sw) activateSwitch(); }
      }
    }
  });
}

// ══════════════════════════════════════════════════════════════════
//  SOUND
// ══════════════════════════════════════════════════════════════════
function playSound(){
  try{
    const ac=new(window.AudioContext||window.webkitAudioContext)();
    [[55,.07,'sawtooth',1.2,28],[800,.02,'sine',.3,150]].forEach(([f,g,tp,d,f2])=>{
      const o=ac.createOscillator(),gn=ac.createGain();
      o.type=tp; o.frequency.setValueAtTime(f,ac.currentTime);
      o.frequency.exponentialRampToValueAtTime(f2,ac.currentTime+d);
      gn.gain.setValueAtTime(g,ac.currentTime);
      gn.gain.exponentialRampToValueAtTime(.001,ac.currentTime+d);
      o.connect(gn); gn.connect(ac.destination);
      o.start(); o.stop(ac.currentTime+d);
    });
  }catch(e){}
}

function startGame(){
  document.getElementById('start-screen').style.display='none';
  gameActive=true;

}

// 去除圖片白色背景（canvas 逐像素處理）
function removeWhiteBg(imgEl, threshold){
  if(!imgEl || !imgEl.complete || imgEl.naturalWidth===0) return;
  try{
    const cv=document.createElement('canvas');
    cv.width=imgEl.naturalWidth; cv.height=imgEl.naturalHeight;
    const ctx=cv.getContext('2d');
    ctx.drawImage(imgEl,0,0);
    const d=ctx.getImageData(0,0,cv.width,cv.height);
    const data=d.data, th=threshold||220;
    for(let i=0;i<data.length;i+=4){
      const r=data[i],g=data[i+1],b=data[i+2];
      // 接近白色的像素設為透明
      if(r>th && g>th && b>th){
        const brightness=(r+g+b)/3;
        // 漸變透明（邊緣自然過渡）
        data[i+3]=Math.round(255*(1-(brightness-th)/(255-th)));
      }
    }
    ctx.putImageData(d,0,0);
    imgEl.src=cv.toDataURL('image/png');
  }catch(e){ /* CORS 失敗就算了 */ }
}

function initRemoveWhiteBg(){
  // 處理所有 start-small 的 img
  document.querySelectorAll('.start-small img').forEach(img=>{
    if(img.complete && img.naturalWidth>0){
      removeWhiteBg(img, 215);
    } else {
      img.addEventListener('load',()=>removeWhiteBg(img, 215));
    }
  });
}

// 在 DOM ready 後執行
if(document.readyState==='loading'){
  document.addEventListener('DOMContentLoaded', initRemoveWhiteBg);
} else {
  setTimeout(initRemoveWhiteBg, 100);
}

initThree();
</script>
