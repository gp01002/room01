<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自我觀測儀 - 垂直能量流動系統</title>
    <!-- 使用整合型的 Holistic 模型以避免資源衝突 -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/holistic/holistic.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 10;
        }
        #input_video {
            display: none;
        }
        #loading-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: opacity 1s;
            color: #FFD700;
            font-family: sans-serif;
            letter-spacing: 4px;
            font-size: 14px;
        }
        #start-btn {
            margin-top: 20px;
            padding: 12px 30px;
            background: transparent;
            border: 1px solid #FFD700;
            color: #FFD700;
            cursor: pointer;
            letter-spacing: 2px;
            transition: all 0.3s;
        }
        #start-btn:hover {
            background: #FFD700;
            color: #000;
        }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div id="status-text">INITIALIZING AI SYSTEM...</div>
        <button id="start-btn">START SYSTEM</button>
    </div>

    <video id="input_video" playsinline muted autoplay></video>
    <canvas id="output_canvas"></canvas>

    <script>
        const videoElement = document.getElementById('input_video');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const loadingScreen = document.getElementById('loading-screen');
        const statusText = document.getElementById('status-text');
        const startBtn = document.getElementById('start-btn');

        let width, height;
        let particles = [];
        let isSystemRunning = false;
        let currentResults = null;

        function resize() {
            width = canvasElement.width = window.innerWidth;
            height = canvasElement.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // --- 垂直能量粒子 (長光柱版) ---
        class EnergyParticle {
            constructor(x, y, hue = 45) {
                this.originX = x;
                this.x = x + (Math.random() - 0.5) * 5; // 極小的水平初始偏差
                this.y = y;
                // 限制水平速度，加強垂直速度
                this.vx = (Math.random() - 0.5) * 0.5; 
                this.vy = 5 + Math.random() * 10;
                this.history = [];
                // 大幅增加歷史長度，實現無限延伸感
                this.maxHistory = 150 + Math.random() * 100; 
                this.hue = hue;
                this.alpha = 1.0;
                // 降低衰減速度，讓光柱留存更久
                this.decay = 0.005 + Math.random() * 0.008; 
                this.gravity = 0.4;
                // 增加光影痕跡的寬度
                this.width = 1.5 + Math.random() * 3.5; 
            }

            update() {
                this.vy += this.gravity;
                // 強力的中心收攏，維持一直線
                this.x += (this.originX - this.x) * 0.1; 
                this.x += this.vx;
                this.y += this.vy;
                this.alpha -= this.decay;
                
                this.history.push({ x: this.x, y: this.y });
                if (this.history.length > this.maxHistory) this.history.shift();
            }

            draw() {
                if (this.history.length < 2 || this.alpha <= 0) return;
                
                canvasCtx.beginPath();
                canvasCtx.moveTo(this.history[0].x, this.history[0].y);
                for (let i = 1; i < this.history.length; i++) {
                    canvasCtx.lineTo(this.history[i].x, this.history[i].y);
                }
                
                // 垂直長線的發光漸層
                const g = canvasCtx.createLinearGradient(this.x, this.y - 200, this.x, this.y);
                g.addColorStop(0, `hsla(${this.hue}, 100%, 90%, 0)`);
                g.addColorStop(0.5, `hsla(${this.hue}, 100%, 75%, ${this.alpha * 0.8})`);
                g.addColorStop(1, `hsla(${this.hue}, 100%, 60%, ${this.alpha})`);

                canvasCtx.strokeStyle = g;
                canvasCtx.lineWidth = this.width;
                canvasCtx.lineCap = 'round';
                canvasCtx.stroke();
            }
        }

        // --- 處理偵測結果與繪圖 ---
        function processAndDraw() {
            if (!isSystemRunning || !currentResults) return;
            
            canvasCtx.globalCompositeOperation = 'lighter';

            // 1. 處理手部 (左右手)
            const hands = [currentResults.leftHandLandmarks, currentResults.rightHandLandmarks];
            hands.forEach(hand => {
                if (hand) {
                    [0, 4, 8, 12, 16, 20].forEach(idx => {
                        const x = (1 - hand[idx].x) * width;
                        const y = hand[idx].y * height;
                        
                        // 持續產生光柱粒子
                        if (Math.random() > 0.2) {
                            particles.push(new EnergyParticle(x, y, 45 + Math.random() * 10));
                        }
                        
                        // 擴大源頭的光影痕跡 (放射狀光暈)
                        const radialSize = 15 + Math.random() * 20;
                        const radial = canvasCtx.createRadialGradient(x, y, 0, x, y, radialSize);
                        radial.addColorStop(0, 'rgba(255, 215, 0, 0.6)');
                        radial.addColorStop(1, 'rgba(255, 215, 0, 0)');
                        canvasCtx.fillStyle = radial;
                        canvasCtx.beginPath();
                        canvasCtx.arc(x, y, radialSize, 0, Math.PI*2);
                        canvasCtx.fill();
                    });
                }
            });

            // 2. 處理臉部
            if (currentResults.faceLandmarks) {
                const nose = currentResults.faceLandmarks[1];
                const x = (1 - nose.x) * width;
                const y = nose.y * height;
                
                // 臉部光柱產生率
                for(let i=0; i<4; i++) {
                    particles.push(new EnergyParticle(x, y, 50 + Math.random() * 10));
                }

                // 臉部中心大光暈
                const faceGlow = canvasCtx.createRadialGradient(x, y, 0, x, y, 40);
                faceGlow.addColorStop(0, 'rgba(255, 255, 255, 0.4)');
                faceGlow.addColorStop(1, 'rgba(255, 215, 0, 0)');
                canvasCtx.fillStyle = faceGlow;
                canvasCtx.beginPath();
                canvasCtx.arc(x, y, 40, 0, Math.PI*2);
                canvasCtx.fill();
            }
        }

        const holistic = new Holistic({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/holistic/${file}`
        });

        holistic.setOptions({
            modelComplexity: 1,
            smoothLandmarks: true,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        holistic.onResults(results => {
            currentResults = results;
            if (loadingScreen.style.opacity !== '0') {
                loadingScreen.style.opacity = '0';
                setTimeout(() => loadingScreen.style.display = 'none', 1000);
            }
        });

        const camera = new Camera(videoElement, {
            onFrame: async () => {
                await holistic.send({image: videoElement});
            },
            width: 1280, height: 720
        });

        startBtn.addEventListener('click', () => {
            isSystemRunning = true;
            statusText.innerText = "CONNECTING CAMERA...";
            camera.start().catch(err => {
                statusText.innerText = "SYSTEM ERROR: " + err;
            });
        });

        function animate() {
            canvasCtx.globalCompositeOperation = 'source-over';
            canvasCtx.fillStyle = 'rgba(0, 0, 0, 0.25)'; // 調整背景殘影，讓光柱連貫
            canvasCtx.fillRect(0, 0, width, height);

            if (isSystemRunning) {
                processAndDraw();
                canvasCtx.globalCompositeOperation = 'lighter';
                for (let i = particles.length - 1; i >= 0; i--) {
                    const p = particles[i];
                    p.update();
                    p.draw();
                    if (p.alpha <= 0 || p.y > height + 200) particles.splice(i, 1);
                }
            }
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
