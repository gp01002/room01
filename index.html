<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自我觀測儀 - 精緻能量流動系統</title>
    <!-- 引入 MediaPipe 必要庫 -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 10;
        }
        #input_video {
            display: none;
        }
        #loading-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: opacity 1s;
            color: #FFD700;
            font-family: sans-serif;
            letter-spacing: 4px;
            font-size: 14px;
        }
        #start-btn {
            margin-top: 20px;
            padding: 12px 30px;
            background: transparent;
            border: 1px solid #FFD700;
            color: #FFD700;
            cursor: pointer;
            letter-spacing: 2px;
            display: none; /* 初始隱藏，模型載入後顯示 */
            transition: all 0.3s;
        }
        #start-btn:hover {
            background: #FFD700;
            color: #000;
        }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div id="status-text">MODELS LOADING...</div>
        <button id="start-btn">START SYSTEM</button>
    </div>

    <!-- 增加相容性屬性 -->
    <video id="input_video" playsinline muted autoplay></video>
    <canvas id="output_canvas"></canvas>

    <script>
        const videoElement = document.getElementById('input_video');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const loadingScreen = document.getElementById('loading-screen');
        const statusText = document.getElementById('status-text');
        const startBtn = document.getElementById('start-btn');

        let width, height;
        let particles = [];
        let currentHandData = [];
        let currentFaceData = null;
        let isSystemRunning = false;

        function resize() {
            width = canvasElement.width = window.innerWidth;
            height = canvasElement.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class EnergyParticle {
            constructor(x, y, hue = 45) {
                this.originX = x;
                this.x = x + (Math.random() - 0.5) * 30;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 4; 
                this.vy = 1 + Math.random() * 6;
                this.history = [];
                this.maxHistory = 40 + Math.random() * 40; 
                this.hue = hue;
                this.alpha = 1.0;
                this.decay = 0.01 + Math.random() * 0.015; 
                this.gravity = 0.2;
                this.width = 0.5 + Math.random() * 1.5; 
            }

            update() {
                this.vy += this.gravity;
                this.x += (this.originX - this.x) * 0.01; 
                this.x += this.vx;
                this.y += this.vy;
                this.alpha -= this.decay;
                this.history.push({ x: this.x, y: this.y });
                if (this.history.length > this.maxHistory) this.history.shift();
            }

            draw() {
                if (this.history.length < 2 || this.alpha <= 0) return;
                canvasCtx.beginPath();
                canvasCtx.moveTo(this.history[0].x, this.history[0].y);
                for (let i = 1; i < this.history.length; i++) {
                    canvasCtx.lineTo(this.history[i].x, this.history[i].y);
                }
                const g = canvasCtx.createLinearGradient(this.x, this.y - 50, this.x, this.y);
                g.addColorStop(0, `hsla(${this.hue}, 100%, 90%, 0)`);
                g.addColorStop(1, `hsla(${this.hue}, 100%, 75%, ${this.alpha})`);
                canvasCtx.strokeStyle = g;
                canvasCtx.lineWidth = this.width;
                canvasCtx.lineCap = 'round';
                canvasCtx.stroke();
            }
        }

        function drawAura() {
            if (!isSystemRunning) return;
            canvasCtx.globalCompositeOperation = 'lighter';
            currentHandData.forEach(hand => {
                [0, 4, 8, 12, 16, 20].forEach(idx => {
                    const x = (1 - hand[idx].x) * width;
                    const y = hand[idx].y * height;
                    if (Math.random() > 0.4) particles.push(new EnergyParticle(x, y, 45 + Math.random() * 10));
                    const radial = canvasCtx.createRadialGradient(x, y, 0, x, y, 8);
                    radial.addColorStop(0, 'rgba(255, 215, 0, 0.3)');
                    radial.addColorStop(1, 'rgba(255, 215, 0, 0)');
                    canvasCtx.fillStyle = radial;
                    canvasCtx.beginPath();
                    canvasCtx.arc(x, y, 8, 0, Math.PI*2);
                    canvasCtx.fill();
                });
            });

            if (currentFaceData) {
                const noseTip = currentFaceData[1];
                const x = (1 - noseTip.x) * width;
                const y = noseTip.y * height;
                for(let i=0; i<2; i++) particles.push(new EnergyParticle(x, y, 50 + Math.random() * 10));
            }
        }

        const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
        hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });

        const faceMesh = new FaceMesh({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}` });
        faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });

        hands.onResults(r => currentHandData = r.multiHandLandmarks || []);
        faceMesh.onResults(r => currentFaceData = r.multiFaceLandmarks ? r.multiFaceLandmarks[0] : null);

        // 初始化相機但不自動開始，等待用戶點擊
        const camera = new Camera(videoElement, {
            onFrame: async () => {
                await hands.send({image: videoElement});
                await faceMesh.send({image: videoElement});
                if (loadingScreen.style.opacity !== '0') {
                    loadingScreen.style.opacity = '0';
                    setTimeout(() => loadingScreen.style.display = 'none', 1000);
                }
            },
            width: 1280, height: 720
        });

        // 模擬模型載入完成
        Promise.all([hands.initialize(), faceMesh.initialize()]).then(() => {
            statusText.innerText = "SYSTEM READY";
            startBtn.style.display = "block";
        });

        startBtn.addEventListener('click', () => {
            isSystemRunning = true;
            camera.start().catch(err => {
                statusText.innerText = "CAMERA ERROR: " + err;
                startBtn.style.display = "none";
            });
        });

        function animate() {
            canvasCtx.globalCompositeOperation = 'source-over';
            canvasCtx.fillStyle = 'rgba(0, 0, 0, 0.35)';
            canvasCtx.fillRect(0, 0, width, height);

            if (isSystemRunning) {
                drawAura();
                canvasCtx.globalCompositeOperation = 'lighter';
                for (let i = particles.length - 1; i >= 0; i--) {
                    const p = particles[i];
                    p.update();
                    p.draw();
                    if (p.alpha <= 0 || p.y > height + 100) particles.splice(i, 1);
                }
            }
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
